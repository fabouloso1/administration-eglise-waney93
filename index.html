<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trezò Legliz — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1F44">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body class="has-login-bg">

<!-- ===== ÉCRAN CONNEXION ===== -->
<div id="loginScreen">
  <div class="login-logo">
    <img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie">
    <div class="login-logo-name">Église de Dieu<br>de la Prophétie</div>
    <div class="login-logo-sub">Waney 93</div>
  </div>

  <div class="card" id="loginCard">
    <div class="card-body">
      <h2>Connexion</h2>
      <p class="card-intro">Accès réservé aux administrateurs et trésoriers</p>
      <form id="loginForm" autocomplete="off">
        <div class="field-group">
          <label class="field-label" for="pw">Mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="pw" name="pw" placeholder="••••••••" required>
            <button type="button" class="toggle-pw" id="togglePw">VOIR</button>
          </div>
        </div>
        <button type="submit" class="submit-btn">Entrer</button>
        <div class="error-msg" id="errorMsg">Mot de passe incorrect. Veuillez réessayer.</div>
      </form>
    </div>
  </div>
</div>

<!-- ===== ÉCRAN MENU PRINCIPAL ===== -->
<div id="menuScreen">
  <div class="menu-header">
    <div class="seal"><img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie"></div>
    <h1>Église de Dieu de la Prophétie</h1>
    <p>Waney 93</p>
  </div>
  <p class="menu-title">Menu Principal</p>

  <nav class="menu-grid">
    <button class="menu-btn c-membres" data-target="membres.html">
      <span class="menu-icon">👥</span>
      <span class="menu-label">Membres</span>
      <span class="menu-sub">Enregistrement</span>
    </button>

    <button class="menu-btn c-dime" data-target="dime.html">
      <span class="menu-icon">💰</span>
      <span class="menu-label">Dîme</span>
      <span class="menu-sub">Contributions</span>
    </button>

    <button class="menu-btn c-offrande" data-target="offrande.html">
      <span class="menu-icon">🙏</span>
      <span class="menu-label">Offrande</span>
      <span class="menu-sub">Dimanche · Étude · Spéciale</span>
    </button>

    <button class="menu-btn c-services" data-target="depenses.html">
      <span class="menu-icon">📋</span>
      <span class="menu-label">Dépenses</span>
      <span class="menu-sub">Gaz · Eau · Veuf(ve)</span>
    </button>

    <button class="menu-btn c-rapport" data-target="rapport.html">
      <span class="menu-icon">📊</span>
      <div>
        <div class="menu-label">Rapport général</div>
        <div class="menu-sub">Vue d'ensemble financière</div>
      </div>
    </button>

    <button class="menu-btn danger" id="closeAppBtn">
      <span class="menu-label">⏻ &nbsp;Fermer la session</span>
    </button>
  </nav>

  <p class="menu-footer">Connecté en tant qu'administrateur / trésorier</p>
</div>

<script>
  // PLACEHOLDER : le mot de passe se trouve ici pour le moment.
  // Plus tard : déplacer cette vérification vers Firebase pour plus de sécurité.
  const ADMIN_PASSWORD = "carrefour2026";

  const loginScreen = document.getElementById('loginScreen');
  const menuScreen = document.getElementById('menuScreen');
  const form = document.getElementById('loginForm');
  const pwInput = document.getElementById('pw');
  const errorMsg = document.getElementById('errorMsg');
  const card = document.getElementById('loginCard');
  const toggleBtn = document.getElementById('togglePw');

  function showMenu(){
    loginScreen.style.display = 'none';
    menuScreen.style.display = 'flex';
  }

  function showLogin(){
    menuScreen.style.display = 'none';
    loginScreen.style.display = 'flex';
    pwInput.value = '';
  }

  // Si l'utilisateur est déjà connecté pendant la session, on va directement au menu
  if (sessionStorage.getItem('trezoLoggedIn') === 'true') {
    showMenu();
  }

  toggleBtn.addEventListener('click', () => {
    const isPw = pwInput.type === 'password';
    pwInput.type = isPw ? 'text' : 'password';
    toggleBtn.textContent = isPw ? 'MASQUER' : 'VOIR';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errorMsg.classList.remove('show');

    if (pwInput.value === ADMIN_PASSWORD) {
      sessionStorage.setItem('trezoLoggedIn', 'true');
      showMenu();
    } else {
      errorMsg.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth; // restart animation
      card.classList.add('shake');
      pwInput.value = '';
      pwInput.focus();
    }
  });

  // Bouton « Fermer l'application »
  document.getElementById('closeAppBtn').addEventListener('click', () => {
    const confirmed = confirm("Voulez-vous vraiment fermer l'application et vous déconnecter ?");
    if (confirmed) {
      sessionStorage.removeItem('trezoLoggedIn');
      showLogin();
    }
  });

  // Boutons de navigation (ces pages seront créées étape par étape)
  document.querySelectorAll('.menu-btn[data-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      window.location.href = btn.dataset.target;
    });
  });
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
