<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trezò Legliz — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0A1F44;
    --navy-mid:#1B3A6B;
    --gold:#C9A24B;
    --gold-soft:#E4CD8C;
    --cream:#F7F5F0;
    --ink:#2E2E2E;
    --error:#B3432B;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Inter',sans-serif;
    background:var(--navy-deep);
    min-height:100vh;
    color:var(--ink);
    position:relative;
  }

  /* ===== LOGIN SCREEN ===== */
  #loginScreen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Background texture: subtle ledger lines */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 47px,
        rgba(201,162,75,0.06) 48px
      );
    pointer-events:none;
  }

  /* Ambient gold glow top-right, like a ledger seal */
  body::after{
    content:"";
    position:absolute;
    top:-200px;
    right:-200px;
    width:600px;
    height:600px;
    background:radial-gradient(circle, rgba(201,162,75,0.18) 0%, transparent 70%);
    pointer-events:none;
  }

  .card{
    position:relative;
    z-index:1;
    background:var(--cream);
    width:100%;
    max-width:420px;
    margin:24px;
    border-radius:2px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.5);
    overflow:hidden;
    opacity:0;
    transform:translateY(16px);
    animation:rise 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  @keyframes rise{
    to{opacity:1;transform:translateY(0);}
  }

  .card-band{
    background:var(--navy-deep);
    padding:36px 40px 28px;
    text-align:center;
    border-bottom:3px solid var(--gold);
  }

  .seal{
    width:64px;
    height:64px;
    margin:0 auto 16px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .seal img{
    width:100%;
    height:100%;
    object-fit:contain;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.35));
  }

  .card-band h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:22px;
    color:var(--cream);
    letter-spacing:0.02em;
    margin-bottom:6px;
  }

  .card-band p{
    font-size:12.5px;
    color:var(--gold-soft);
    letter-spacing:0.08em;
    text-transform:uppercase;
  }

  .card-body{
    padding:36px 40px 40px;
  }

  .field-label{
    display:block;
    font-size:13px;
    font-weight:500;
    color:var(--navy-mid);
    margin-bottom:8px;
    letter-spacing:0.01em;
  }

  .pw-wrap{
    position:relative;
  }

  input[type="password"],
  input[type="text"]{
    width:100%;
    padding:14px 44px 14px 16px;
    border:1.5px solid #D8D2C2;
    border-radius:2px;
    font-size:15px;
    font-family:'Inter',sans-serif;
    background:#fff;
    color:var(--ink);
    transition:border-color 0.2s ease;
  }

  input:focus{
    outline:none;
    border-color:var(--navy-mid);
  }

  .toggle-pw{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
    color:#9A9182;
    font-size:12px;
    font-weight:500;
    letter-spacing:0.03em;
    padding:4px;
  }

  .toggle-pw:hover{color:var(--navy-mid);}

  .submit-btn{
    width:100%;
    margin-top:22px;
    padding:14px;
    background:var(--navy-deep);
    color:var(--cream);
    border:none;
    border-radius:2px;
    font-size:14.5px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    cursor:pointer;
    transition:background 0.2s ease, transform 0.1s ease;
  }

  .submit-btn:hover{background:var(--navy-mid);}
  .submit-btn:active{transform:scale(0.99);}

  .error-msg{
    display:none;
    margin-top:14px;
    padding:11px 14px;
    background:#FBEDE8;
    border-left:3px solid var(--error);
    color:var(--error);
    font-size:13px;
    border-radius:2px;
  }

  .error-msg.show{display:block;}

  .footer-note{
    text-align:center;
    margin-top:24px;
    font-size:13px;
    font-weight:500;
    color:#6B6457;
    letter-spacing:0.02em;
  }

  /* Shake animation for wrong password */
  .shake{
    animation:shake 0.4s ease;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(6px);}
  }

  @media (prefers-reduced-motion: reduce){
    .card{animation:none;opacity:1;transform:none;}
    .shake{animation:none;}
  }

  /* ===== MENU SCREEN ===== */
  #menuScreen{
    display:none;
    min-height:100vh;
    flex-direction:column;
    align-items:center;
    background:var(--cream);
  }

  .menu-header{
    width:100%;
    background:var(--navy-deep);
    padding:32px 28px 26px;
    text-align:center;
    border-bottom:3px solid var(--gold);
    position:relative;
  }

  .menu-header::after{
    content:"";
    position:absolute;
    top:-150px;
    right:-150px;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(201,162,75,0.15) 0%, transparent 70%);
    pointer-events:none;
  }

  .menu-header .seal{
    width:56px;height:56px;margin:0 auto 12px;
    display:flex;align-items:center;justify-content:center;
    position:relative;z-index:1;
  }

  .menu-header .seal img{
    width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.35));
  }

  .menu-header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:20px;
    color:var(--cream);
    letter-spacing:0.02em;
    margin-bottom:4px;
    position:relative;z-index:1;
  }

  .menu-header p{
    font-size:11.5px;
    color:var(--gold-soft);
    letter-spacing:0.07em;
    text-transform:uppercase;
    position:relative;z-index:1;
  }

  .menu-title{
    width:100%;
    text-align:center;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:18px;
    color:var(--navy-deep);
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:22px 0 6px;
  }

  .menu-grid{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:24px;
    max-width:560px;
    width:100%;
    align-content:start;
  }

  .menu-btn{
    background:#fff;
    border:1.5px solid #E3DDC9;
    border-radius:3px;
    padding:22px 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    cursor:pointer;
    text-align:center;
    transition:border-color 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease;
    font-family:'Inter',sans-serif;
    color:var(--navy-deep);
  }

  .menu-btn:hover{
    border-color:var(--gold);
    transform:translateY(-2px);
    box-shadow:0 8px 20px -8px rgba(10,31,68,0.25);
  }

  .menu-btn:active{transform:translateY(0);}

  .menu-icon{
    width:40px;height:40px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;
    font-size:17px;
    font-weight:600;
    color:var(--gold);
    border:1.5px solid var(--gold-soft);
    border-radius:50%;
  }

  .menu-label{
    font-size:14.5px;
    font-weight:700;
    color:var(--navy-deep);
    letter-spacing:0.01em;
  }

  .menu-sub{
    font-size:12px;
    font-weight:500;
    color:#6B6457;
    letter-spacing:0.02em;
  }

  .menu-btn.danger{
    grid-column:1 / -1;
    background:#FBEDE8;
    border:1.5px solid var(--error);
    flex-direction:row;
    justify-content:center;
    padding:16px;
    margin-top:6px;
    margin-bottom:8px;
  }

  .menu-btn.danger .menu-label{color:var(--error);font-size:14px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
  .menu-btn.danger .menu-icon{display:none;}
  .menu-btn.danger:hover{background:#F6DDD5;border-color:#8E3522;}

  /* Koulè pèsonalize pou chak bouton, enspire pa logo legliz la */
  .menu-btn.c-membres{border-top:4px solid #B3432B;background:#FDF6F4;}
  .menu-btn.c-membres .menu-icon{color:#B3432B;border-color:#E3A893;}

  .menu-btn.c-dime{border-top:4px solid #C9A24B;background:#FBF8EF;}
  .menu-btn.c-dime .menu-icon{color:#C9A24B;border-color:var(--gold-soft);}

  .menu-btn.c-offrande{border-top:4px solid #6B2E8C;background:#F8F3FA;}
  .menu-btn.c-offrande .menu-icon{color:#6B2E8C;border-color:#C9A8DA;}

  .menu-btn.c-services{border-top:4px solid #1B3A6B;background:#F2F5FA;}
  .menu-btn.c-services .menu-icon{color:#1B3A6B;border-color:#A9BBD9;}

  .menu-btn.c-rapport{border-top:4px solid #2E7D5B;background:#F2F9F5;}
  .menu-btn.c-rapport .menu-icon{color:#2E7D5B;border-color:#A8D6BF;}

  .menu-footer{
    width:100%;
    text-align:center;
    padding:18px;
    font-size:12.5px;
    font-weight:500;
    color:#6B6457;
    letter-spacing:0.02em;
  }
</style>
</head>
<body>

<!-- ===== ÉCRAN CONNEXION ===== -->
<div id="loginScreen">
  <div class="card" id="loginCard">
    <div class="card-band">
      <div class="seal"><img src="assets/logo.png" alt="Logo Église de Dieu de la Prophétie"></div>
      <h1>Église de Dieu de la Prophétie</h1>
      <p>Waney 93</p>
    </div>
    <div class="card-body">
      <form id="loginForm" autocomplete="off">
        <label class="field-label" for="pw">Mot de passe administrateur / trésorier</label>
        <div class="pw-wrap">
          <input type="password" id="pw" name="pw" placeholder="••••••••" required>
          <button type="button" class="toggle-pw" id="togglePw">VOIR</button>
        </div>
        <button type="submit" class="submit-btn">Entrer</button>
        <div class="error-msg" id="errorMsg">Mot de passe incorrect. Veuillez réessayer.</div>
      </form>
      <p class="footer-note">Accès réservé au trésorier et aux administrateurs de l'église</p>
    </div>
  </div>
</div>

<!-- ===== ÉCRAN MENU PRINCIPAL ===== -->
<div id="menuScreen">
  <div class="menu-header">
    <div class="seal"><img src="assets/logo.png" alt="Logo Église de Dieu de la Prophétie"></div>
    <h1>Église de Dieu de la Prophétie</h1>
    <p>Waney 93</p>
  </div>
  <p class="menu-title">Menu Principal</p>

  <nav class="menu-grid">
    <button class="menu-btn c-membres" data-target="membres.html">
      <span class="menu-icon">👤</span>
      <span class="menu-label">Membres</span>
      <span class="menu-sub">Enregistrement</span>
    </button>

    <button class="menu-btn c-dime" data-target="dime.html">
      <span class="menu-icon">✦</span>
      <span class="menu-label">Dîme</span>
      <span class="menu-sub">Contributions</span>
    </button>

    <button class="menu-btn c-offrande" data-target="offrande.html">
      <span class="menu-icon">✦</span>
      <span class="menu-label">Offrande</span>
      <span class="menu-sub">Contributions</span>
    </button>

    <button class="menu-btn c-services" data-target="services.html">
      <span class="menu-icon">✦</span>
      <span class="menu-label">Services</span>
      <span class="menu-sub">Matin · Soir · Jeûne · Veillée</span>
    </button>

    <button class="menu-btn c-rapport" data-target="rapport.html">
      <span class="menu-icon">✦</span>
      <span class="menu-label">Rapport général</span>
      <span class="menu-sub">Vue d'ensemble</span>
    </button>

    <button class="menu-btn danger" id="closeAppBtn">
      <span class="menu-label">Fermer l'application</span>
    </button>
  </nav>

  <p class="menu-footer">Connecté en tant qu'administrateur / trésorier</p>
</div>

<script>
  // PLACEHOLDER : le mot de passe se trouve ici pour le moment.
  // Plus tard : déplacer cette vérification vers Firebase pour plus de sécurité.
  const ADMIN_PASSWORD = "carrefour2026";

  const loginScreen = document.getElementById('loginScreen');
  const menuScreen = document.getElementById('menuScreen');
  const form = document.getElementById('loginForm');
  const pwInput = document.getElementById('pw');
  const errorMsg = document.getElementById('errorMsg');
  const card = document.getElementById('loginCard');
  const toggleBtn = document.getElementById('togglePw');

  function showMenu(){
    loginScreen.style.display = 'none';
    menuScreen.style.display = 'flex';
  }

  function showLogin(){
    menuScreen.style.display = 'none';
    loginScreen.style.display = 'flex';
    pwInput.value = '';
  }

  // Si l'utilisateur est déjà connecté pendant la session, on va directement au menu
  if (sessionStorage.getItem('trezoLoggedIn') === 'true') {
    showMenu();
  }

  toggleBtn.addEventListener('click', () => {
    const isPw = pwInput.type === 'password';
    pwInput.type = isPw ? 'text' : 'password';
    toggleBtn.textContent = isPw ? 'MASQUER' : 'VOIR';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errorMsg.classList.remove('show');

    if (pwInput.value === ADMIN_PASSWORD) {
      sessionStorage.setItem('trezoLoggedIn', 'true');
      showMenu();
    } else {
      errorMsg.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth; // restart animation
      card.classList.add('shake');
      pwInput.value = '';
      pwInput.focus();
    }
  });

  // Bouton « Fermer l'application »
  document.getElementById('closeAppBtn').addEventListener('click', () => {
    const confirmed = confirm("Voulez-vous vraiment fermer l'application et vous déconnecter ?");
    if (confirmed) {
      sessionStorage.removeItem('trezoLoggedIn');
      showLogin();
    }
  });

  // Boutons de navigation (ces pages seront créées étape par étape)
  document.querySelectorAll('.menu-btn[data-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      window.location.href = btn.dataset.target;
    });
  });
</script>

</body>
</html>
