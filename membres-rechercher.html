<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rechercher un membre — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1F44">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  /* Koulè background degrade tèm Dépenses lan */
  body {
    background: linear-gradient(160deg, #F5E3D8 0%, #EAD0BF 55%, #E0C0AC 100%) !important;
    font-family: 'Inter', sans-serif !important;
    margin: 0;
    padding: 0;
    color: #1E3A8A !important;
  }

  .list-wrap{
    width:100%;
    max-width:680px;
    padding:16px 20px 32px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin: 0 auto;
    box-sizing: border-box;
  }

  .member-card{
    background:linear-gradient(165deg, #ffffff 0%, #fdfaf8 100%);
    border:1.5px solid #E3DDC9;
    border-radius:10px;
    padding:18px 14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    box-shadow:0 5px 16px -8px rgba(10,31,68,0.2);
    transition:transform 0.15s ease, box-shadow 0.2s ease;
  }

  .member-card:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px -10px rgba(10,31,68,0.3);
  }

  .member-photo{
    width:84px;
    height:84px;
    border-radius:50%;
    border:2.5px solid #C9543A;
    background:#F2F0E8;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-bottom:10px;
  }

  .member-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .member-photo .photo-placeholder{
    font-size:33.5px;
    color:#B8AE94;
  }

  .member-name{
    font-size:16px;
    font-weight:700;
    color:#0A1F44;
    margin-bottom:4px;
    line-height:1.3;
  }

  .member-fonction{
    display:inline-block;
    font-size:12.5px;
    font-weight:600;
    color:#C9543A;
    background:#FBF8EF;
    border:1px solid #E3DDC9;
    border-radius:12px;
    padding:2px 10px;
    margin-bottom:8px;
    letter-spacing:0.02em;
  }

  .member-detail{
    font-size:13.5px;
    color:#6B6457;
    line-height:1.5;
  }

  .search-wrap{
    width:100%;
    max-width:680px;
    padding:0 24px 4px;
    margin: 0 auto;
    box-sizing: border-box;
  }

  .search-wrap input{
    width:100%;
    padding:12px 14px;
    border:1.5px solid #D8D2C2;
    border-radius:3px;
    font-size:15.5px;
    font-family:'Inter',sans-serif;
    background-color: white;
  }

  .search-wrap input:focus{outline:none;border-color:#1E3A8A;}

  .count-indicator{
    width:100%;
    text-align:center;
    font-size:14px;
    color:#6B6457;
    padding:10px 0 4px;
  }

  .empty-state{
    grid-column:1 / -1;
    text-align:center;
    padding:32px 16px;
    color:#9A9182;
    font-size:15px;
  }

  /* BOUTON RECHERCHER */
  .search-row{
    display:flex;
    gap:10px;
  }
  .search-row input{ flex:1; }

  .btn-search{
    padding:0 20px;
    background:linear-gradient(135deg, #0A1F44 0%, #1E3A8A 100%);
    color:#fff;
    border:none;
    border-radius:3px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(30,58,138,0.3);
    border-bottom:3px solid #061329;
    transition:transform 0.1s ease;
    white-space:nowrap;
  }
  .btn-search:active{ transform:translateY(2px); border-bottom-width:1px; }

  /* LIS LÈT ALFABÈ */
  .alphabet-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    justify-content:center;
    margin-top:14px;
  }

  .letter-btn{
    min-width:32px;
    height:32px;
    padding:0 8px;
    border-radius:16px;
    border:1.5px solid #D8D2C2;
    background:#fff;
    color:#1E3A8A;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .letter-btn:hover{ border-color:#1E3A8A; }
  .letter-btn.active{
    background:linear-gradient(135deg, #0A1F44 0%, #1E3A8A 100%);
    color:#fff;
    border-color:#1E3A8A;
    box-shadow:0 3px 8px rgba(30,58,138,0.3);
  }
  .letter-btn.all-btn{ font-size:13px; }

  /* ===== AFFICHAGE PC / GRAND ÉCRAN ===== */
  @media (min-width: 700px){
    .search-wrap, .list-wrap{ max-width: 920px; }
    .list-wrap{ grid-template-columns: repeat(3, 1fr); }
    .alphabet-row{ max-width: 640px; margin-left:auto; margin-right:auto; }
  }
  @media (min-width: 1000px){
    .search-wrap, .list-wrap{ max-width: 1080px; }
    .list-wrap{ grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<div class="page-header">
  <a href="membres.html" class="back-link">← Retour</a>
  <div class="seal"><img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie"></div>
  <h1>Église de Dieu de la Prophétie</h1>
  <p>Waney 93</p>
</div>

<p class="section-title">Rechercher un membre</p>
<p class="section-sub">Cliquez sur un membre pour voir sa fiche complète</p>

<div class="search-wrap">
  <div class="search-row">
    <input type="text" id="filterInput" placeholder="Rechercher par nom ou prénom...">
    <button type="button" id="btnSearch" class="btn-search">🔍 Rechercher</button>
  </div>
  <div class="alphabet-row" id="alphabetRow">
    <button type="button" class="letter-btn all-btn active" data-letter="">Tous</button>
    <button type="button" class="letter-btn" data-letter="A">A</button>
    <button type="button" class="letter-btn" data-letter="B">B</button>
    <button type="button" class="letter-btn" data-letter="C">C</button>
    <button type="button" class="letter-btn" data-letter="D">D</button>
    <button type="button" class="letter-btn" data-letter="E">E</button>
    <button type="button" class="letter-btn" data-letter="F">F</button>
    <button type="button" class="letter-btn" data-letter="G">G</button>
    <button type="button" class="letter-btn" data-letter="H">H</button>
    <button type="button" class="letter-btn" data-letter="I">I</button>
    <button type="button" class="letter-btn" data-letter="J">J</button>
    <button type="button" class="letter-btn" data-letter="K">K</button>
    <button type="button" class="letter-btn" data-letter="L">L</button>
    <button type="button" class="letter-btn" data-letter="M">M</button>
    <button type="button" class="letter-btn" data-letter="N">N</button>
    <button type="button" class="letter-btn" data-letter="O">O</button>
    <button type="button" class="letter-btn" data-letter="P">P</button>
    <button type="button" class="letter-btn" data-letter="Q">Q</button>
    <button type="button" class="letter-btn" data-letter="R">R</button>
    <button type="button" class="letter-btn" data-letter="S">S</button>
    <button type="button" class="letter-btn" data-letter="T">T</button>
    <button type="button" class="letter-btn" data-letter="U">U</button>
    <button type="button" class="letter-btn" data-letter="V">V</button>
    <button type="button" class="letter-btn" data-letter="W">W</button>
    <button type="button" class="letter-btn" data-letter="X">X</button>
    <button type="button" class="letter-btn" data-letter="Y">Y</button>
    <button type="button" class="letter-btn" data-letter="Z">Z</button>
  </div>
</div>
<p class="count-indicator" id="countIndicator">Chargement...</p>

<div class="list-wrap" id="listWrap"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaNOl7j9xReumR69PIiyTPrwncJ7-ysG8",
    authDomain: "tresor-de-l-eglise.firebaseapp.com",
    projectId: "tresor-de-l-eglise",
    storageBucket: "tresor-de-l-eglise.firebasestorage.app",
    messagingSenderId: "702537717579",
    appId: "1:702537717579:web:e1e8726ab66a89b355face"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  if (sessionStorage.getItem('trezoLoggedIn') !== 'true') {
    window.location.href = 'index.html';
  }

  const listWrap = document.getElementById('listWrap');
  const countIndicator = document.getElementById('countIndicator');
  const filterInput = document.getElementById('filterInput');

  let allMembers = [];
  let activeLetter = '';

  function normalize(str){
    return (str || '').toString().toLowerCase().trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function renderCard(id, data){
    const card = document.createElement('div');
    card.className = 'member-card';
    card.style.cursor = 'pointer';

    const photoContent = data.photo
      ? `<img src="${data.photo}" alt="Photo de ${data.nom || ''}">`
      : `<span class="photo-placeholder">👤</span>`;

    // Si fonksyon an vid, li otomatikman afiche "Membre"
    const fonctionText = data.fonctions || data.fonction || 'Membre';
    const fonctionHtml = `<span class="member-fonction">${fonctionText}</span>`;

    // Si NIF/CIN oswa telefòn pa la, li afiche "Non spécifié" pou evite espas vid
    const nifValue = data.carte || data.nifCin || 'Non spécifié';
    const telValue = data.telephone1 || data.telephone || 'Non spécifié';

    const nifLine = `NIF/CIN : ${nifValue}<br>`;
    const telLine = `Tél. : ${telValue}`;

    card.innerHTML = `
      <div class="member-photo">${photoContent}</div>
      <div class="member-name">${data.nom || ''} ${data.prenom || ''}</div>
      ${fonctionHtml}
      <div class="member-detail">${nifLine}${telLine}</div>
    `;

    card.addEventListener('click', () => {
      window.location.href = `membre-fiche.html?membreId=${encodeURIComponent(id)}`;
    });

    return card;
  }

  function renderList(members){
    listWrap.innerHTML = '';

    if (members.length === 0) {
      listWrap.innerHTML = '<p class="empty-state">Aucun membre trouvé.</p>';
      return;
    }

    members.forEach(({ id, data }) => {
      listWrap.appendChild(renderCard(id, data));
    });
  }

  function applyFilter(){
    const term = normalize(filterInput.value);

    let filtered;
    if (term) {
      // Rechèch pa mòso tèks — jwenn tout moun ki gen "term" nan non OSWA siyati yo,
      // nenpòt kote li ye (egzanp "dinville" jwenn "Dinville Fabrice" AK "Dinville Berthony")
      filtered = allMembers.filter(({ data }) => {
        const nom = normalize(data.nom);
        const prenom = normalize(data.prenom);
        const nomPrenom = `${nom} ${prenom}`.trim();
        const prenomNom = `${prenom} ${nom}`.trim();
        return nom.includes(term) || prenom.includes(term) || nomPrenom.includes(term) || prenomNom.includes(term);
      });
      countIndicator.textContent = `${filtered.length} membre(s) trouvé(s) pour "${filterInput.value.trim()}"`;
    } else if (activeLetter) {
      // Filtraj rapid pa lèt — non ki KOMANSE ak lèt la
      filtered = allMembers.filter(({ data }) => normalize(data.nom).startsWith(activeLetter.toLowerCase()));
      countIndicator.textContent = `${filtered.length} membre(s) — lèt "${activeLetter}"`;
    } else {
      filtered = allMembers;
      countIndicator.textContent = `${allMembers.length} membre(s)`;
    }

    renderList(filtered);
  }

  function setActiveLetter(letter){
    activeLetter = letter;
    document.querySelectorAll('.letter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.letter === letter);
    });
  }

  async function loadMembers(){
    countIndicator.textContent = 'Chargement...';

    try {
      const snapshot = await getDocs(collection(db, 'membres'));
      allMembers = [];

      snapshot.forEach((docSnap) => {
        allMembers.push({ id: docSnap.id, data: docSnap.data() });
      });

      allMembers.sort((a, b) => normalize(a.data.nom).localeCompare(normalize(b.data.nom)));

      renderList(allMembers);
      countIndicator.textContent = `${allMembers.length} membre(s)`;
    } catch (err) {
      console.error(err);
      countIndicator.textContent = 'Erreur lors du chargement : ' + err.message;
    }
  }

  filterInput.addEventListener('input', () => {
    if (filterInput.value.trim()) setActiveLetter('');
    applyFilter();
  });

  document.getElementById('btnSearch').addEventListener('click', applyFilter);

  document.querySelectorAll('.letter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterInput.value = '';
      setActiveLetter(btn.dataset.letter);
      applyFilter();
    });
  });

  loadMembers();
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
