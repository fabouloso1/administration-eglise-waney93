<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rechercher un membre — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1F44">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  .list-wrap{
    width:100%;
    max-width:680px;
    padding:16px 20px 32px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .member-card{
    background:linear-gradient(165deg, #ffffff 0%, #fdfaf8 100%);
    border:1.5px solid #E3DDC9;
    border-radius:10px;
    padding:18px 14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    box-shadow:0 5px 16px -8px rgba(10,31,68,0.2);
    transition:transform 0.15s ease, box-shadow 0.2s ease;
  }

  .member-card:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px -10px rgba(10,31,68,0.3);
  }

  .member-photo{
    width:84px;
    height:84px;
    border-radius:50%;
    border:2.5px solid var(--gold-soft);
    background:#F2F0E8;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-bottom:10px;
  }

  .member-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .member-photo .photo-placeholder{
    font-size:30px;
    color:#B8AE94;
  }

  .member-name{
    font-size:14.5px;
    font-weight:700;
    color:var(--navy-deep);
    margin-bottom:4px;
    line-height:1.3;
  }

  .member-fonction{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    color:var(--gold);
    background:#FBF8EF;
    border:1px solid var(--gold-soft);
    border-radius:12px;
    padding:2px 10px;
    margin-bottom:8px;
    letter-spacing:0.02em;
  }

  .member-detail{
    font-size:12px;
    color:#6B6457;
    line-height:1.5;
  }

  .search-wrap{
    width:100%;
    max-width:680px;
    padding:0 24px 4px;
  }

  .search-wrap input{
    width:100%;
    padding:12px 14px;
    border:1.5px solid #D8D2C2;
    border-radius:3px;
    font-size:14px;
    font-family:'Inter',sans-serif;
  }

  .search-wrap input:focus{outline:none;border-color:var(--navy-mid);}

  .count-indicator{
    width:100%;
    text-align:center;
    font-size:12.5px;
    color:#6B6457;
    padding:10px 0 4px;
  }

  .empty-state{
    grid-column:1 / -1;
    text-align:center;
    padding:32px 16px;
    color:#9A9182;
    font-size:13.5px;
  }
</style>
</head>
<body>

<div class="page-header">
  <a href="membres.html" class="back-link">← Retour</a>
  <div class="seal"><img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie"></div>
  <h1>Église de Dieu de la Prophétie</h1>
  <p>Waney 93</p>
</div>

<p class="section-title">Rechercher un membre</p>
<p class="section-sub">Cliquez sur un membre pour voir sa fiche complète</p>

<div class="search-wrap">
  <input type="text" id="filterInput" placeholder="Rechercher par nom ou prénom...">
</div>
<p class="count-indicator" id="countIndicator">Chargement...</p>

<div class="list-wrap" id="listWrap"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaNOl7j9xReumR69PIiyTPrwncJ7-ysG8",
    authDomain: "tresor-de-l-eglise.firebaseapp.com",
    projectId: "tresor-de-l-eglise",
    storageBucket: "tresor-de-l-eglise.firebasestorage.app",
    messagingSenderId: "702537717579",
    appId: "1:702537717579:web:e1e8726ab66a89b355face"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Sécurité : on vérifie que l'utilisateur est bien connecté
  if (sessionStorage.getItem('trezoLoggedIn') !== 'true') {
    window.location.href = 'index.html';
  }

  const listWrap = document.getElementById('listWrap');
  const countIndicator = document.getElementById('countIndicator');
  const filterInput = document.getElementById('filterInput');

  let allMembers = [];

  function normalize(str){
    return (str || '').toString().toLowerCase().trim();
  }

  function renderCard(id, data){
    const card = document.createElement('div');
    card.className = 'member-card';
    card.style.cursor = 'pointer';

    const photoContent = data.photo
      ? `<img src="${data.photo}" alt="Photo de ${data.nom || ''}">`
      : `<span class="photo-placeholder">👤</span>`;

    const fonctionHtml = data.fonction
      ? `<span class="member-fonction">${data.fonction}</span>`
      : '';

    const nifLine = data.nifCin ? `NIF/CIN : ${data.nifCin}<br>` : '';
    const telLine = data.telephone ? `Tél. : ${data.telephone}` : '';

    card.innerHTML = `
      <div class="member-photo">${photoContent}</div>
      <div class="member-name">${data.nom || ''} ${data.prenom || ''}</div>
      ${fonctionHtml}
      <div class="member-detail">${nifLine}${telLine}</div>
    `;

    card.addEventListener('click', () => {
      window.location.href = `membre-fiche.html?membreId=${encodeURIComponent(id)}`;
    });

    return card;
  }

  function renderList(members){
    listWrap.innerHTML = '';

    if (members.length === 0) {
      listWrap.innerHTML = '<p class="empty-state">Aucun membre trouvé.</p>';
      return;
    }

    members.forEach(({ id, data }) => {
      listWrap.appendChild(renderCard(id, data));
    });
  }

  function applyFilter(){
    const term = normalize(filterInput.value);

    if (!term) {
      renderList(allMembers);
      countIndicator.textContent = `${allMembers.length} membre(s)`;
      return;
    }

    const filtered = allMembers.filter(({ data }) => {
      const nom = normalize(data.nom);
      const prenom = normalize(data.prenom);
      const nomPrenom = `${nom} ${prenom}`.trim();
      const prenomNom = `${prenom} ${nom}`.trim();
      return nom.includes(term) || prenom.includes(term) || nomPrenom.includes(term) || prenomNom.includes(term);
    });

    renderList(filtered);
    countIndicator.textContent = `${filtered.length} membre(s) trouvé(s)`;
  }

  async function loadMembers(){
    countIndicator.textContent = 'Chargement...';

    try {
      const snapshot = await getDocs(collection(db, 'membres'));
      allMembers = [];

      snapshot.forEach((docSnap) => {
        allMembers.push({ id: docSnap.id, data: docSnap.data() });
      });

      // Tri alphabétique par nom
      allMembers.sort((a, b) => normalize(a.data.nom).localeCompare(normalize(b.data.nom)));

      renderList(allMembers);
      countIndicator.textContent = `${allMembers.length} membre(s)`;
    } catch (err) {
      console.error(err);
      countIndicator.textContent = 'Erreur lors du chargement : ' + err.message;
    }
  }

  filterInput.addEventListener('input', applyFilter);

  loadMembers();
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
