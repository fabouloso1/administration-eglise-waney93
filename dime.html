<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dîme — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1F44">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  /* Styles spécifiques à la page Dîme */
  .add-btn-wrap{
    width:100%;
    max-width:560px;
    padding:20px 24px 8px;
  }

  .btn-add-dime{
    width:100%;
    padding:16px;
    background:linear-gradient(165deg, #D6B468 0%, var(--gold) 100%);
    color:var(--navy-deep);
    border:none;
    border-radius:6px;
    font-size:14.5px;
    font-weight:700;
    letter-spacing:0.03em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 6px 16px -6px rgba(201,162,75,0.5);
    transition:transform 0.12s ease, box-shadow 0.2s ease;
  }

  .btn-add-dime:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px -8px rgba(201,162,75,0.6);
  }

  .year-selector{
    width:100%;
    max-width:560px;
    padding:20px 24px 8px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
  }

  .year-arrow{
    width:38px;
    height:38px;
    border-radius:50%;
    border:1.5px solid #D8D2C2;
    background:#fff;
    color:var(--navy-deep);
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 2px 8px -3px rgba(0,0,0,0.12);
    transition:border-color 0.2s ease, transform 0.1s ease;
  }

  .year-arrow:hover{border-color:var(--gold);transform:translateY(-1px);}
  .year-arrow:active{transform:translateY(0);}

  .year-display{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:22px;
    color:var(--navy-deep);
    letter-spacing:0.02em;
    min-width:80px;
    text-align:center;
  }

  .months-wrap{
    width:100%;
    max-width:560px;
    padding:16px 24px 8px;
  }

  .month-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:linear-gradient(165deg, #ffffff 0%, #fbfaf6 100%);
    border:1.5px solid #E3DDC9;
    border-left:4px solid var(--gold);
    border-radius:6px;
    padding:13px 18px;
    margin-bottom:9px;
    box-shadow:0 3px 10px -6px rgba(10,31,68,0.12);
  }

  .month-name{
    font-size:14px;
    font-weight:600;
    color:var(--navy-deep);
  }

  .month-total{
    font-size:14.5px;
    font-weight:700;
    color:var(--gold);
    font-family:'Fraunces',serif;
  }

  .total-wrap{
    width:100%;
    max-width:560px;
    padding:14px 24px 32px;
  }

  .total-card{
    background:linear-gradient(155deg, var(--navy-deep) 0%, var(--navy-mid) 100%);
    border-radius:8px;
    padding:20px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 10px 24px -10px rgba(10,31,68,0.45);
  }

  .total-label{
    font-size:13px;
    font-weight:600;
    color:var(--gold-soft);
    letter-spacing:0.04em;
    text-transform:uppercase;
  }

  .total-amount{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:24px;
    color:#fff;
  }

  /* Modal détail d'un mois */
  .month-modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,31,68,0.55);
    z-index:50;
    align-items:flex-end;
    justify-content:center;
  }

  .month-modal-overlay.show{display:flex;}

  .month-modal{
    background:var(--cream);
    width:100%;
    max-width:520px;
    max-height:80vh;
    border-radius:16px 16px 0 0;
    overflow-y:auto;
    box-shadow:0 -20px 50px rgba(0,0,0,0.3);
    animation:slideUp 0.25s ease-out;
  }

  @keyframes slideUp{
    from{transform:translateY(100%);}
    to{transform:translateY(0);}
  }

  .month-modal-header{
    position:sticky;
    top:0;
    background:linear-gradient(155deg, var(--navy-deep) 0%, var(--navy-mid) 100%);
    padding:18px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:3px solid var(--gold);
  }

  .month-modal-title{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:17px;
    color:#fff;
  }

  .month-modal-close{
    width:30px;height:30px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    color:#fff;
    border:none;
    font-size:16px;
    cursor:pointer;
  }

  .month-modal-body{
    padding:18px 20px 28px;
  }

  .month-person-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fff;
    border:1.5px solid #E3DDC9;
    border-left:4px solid var(--gold);
    border-radius:6px;
    padding:12px 16px;
    margin-bottom:9px;
    box-shadow:0 3px 10px -6px rgba(10,31,68,0.12);
    transition:transform 0.12s ease, box-shadow 0.2s ease;
  }

  .month-person-row:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 16px -8px rgba(10,31,68,0.25);
    border-color:var(--gold);
  }

  .month-person-name{
    font-size:14px;
    font-weight:600;
    color:var(--navy-deep);
  }

  .month-person-amount{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:14px;
    color:var(--gold);
  }

  .month-modal-total{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
    margin-top:6px;
    background:linear-gradient(155deg, var(--navy-deep) 0%, var(--navy-mid) 100%);
    border-radius:6px;
  }

  .month-modal-total span:first-child{
    font-size:12px;
    font-weight:600;
    color:var(--gold-soft);
    text-transform:uppercase;
    letter-spacing:0.03em;
  }

  .month-modal-total span:last-child{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:16px;
    color:#fff;
  }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">← Retour</a>
  <div class="seal"><img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie"></div>
  <h1>Église de Dieu de la Prophétie</h1>
  <p>Waney 93</p>
</div>

<p class="section-title">Dîme</p>
<p class="section-sub">Contributions par mois</p>

<div class="add-btn-wrap">
  <button class="btn-add-dime" id="btnAddDime">+ Enregistrer une nouvelle dîme</button>
</div>

<div class="year-selector">
  <button class="year-arrow" id="prevYear">◀</button>
  <span class="year-display" id="yearDisplay">2026</span>
  <button class="year-arrow" id="nextYear">▶</button>
</div>

<div class="months-wrap" id="monthsWrap">
  <!-- Les 12 lignes de mois sont générées par JavaScript -->
</div>

<div class="total-wrap">
  <div class="total-card">
    <span class="total-label">Total général</span>
    <span class="total-amount" id="totalAmount">0 HTG</span>
  </div>
</div>

<div class="month-modal-overlay" id="monthModalOverlay">
  <div class="month-modal">
    <div class="month-modal-header">
      <span class="month-modal-title" id="monthModalTitle">Mois</span>
      <button class="month-modal-close" id="monthModalClose">✕</button>
    </div>
    <div class="month-modal-body" id="monthModalBody"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaNOl7j9xReumR69PIiyTPrwncJ7-ysG8",
    authDomain: "tresor-de-l-eglise.firebaseapp.com",
    projectId: "tresor-de-l-eglise",
    storageBucket: "tresor-de-l-eglise.firebasestorage.app",
    messagingSenderId: "702537717579",
    appId: "1:702537717579:web:e1e8726ab66a89b355face"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Sécurité : on vérifie que l'utilisateur est bien connecté
  if (sessionStorage.getItem('trezoLoggedIn') !== 'true') {
    window.location.href = 'index.html';
  }

  const MOIS = [
    'Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin',
    'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'
  ];

  let currentYear = new Date().getFullYear();

  const yearDisplay = document.getElementById('yearDisplay');
  const monthsWrap = document.getElementById('monthsWrap');
  const totalAmount = document.getElementById('totalAmount');
  const prevYearBtn = document.getElementById('prevYear');
  const nextYearBtn = document.getElementById('nextYear');
  const btnAddDime = document.getElementById('btnAddDime');

  function formatMontant(montant){
    return montant.toLocaleString('fr-FR') + ' HTG';
  }

  const monthModalOverlay = document.getElementById('monthModalOverlay');
  const monthModalTitle = document.getElementById('monthModalTitle');
  const monthModalBody = document.getElementById('monthModalBody');
  const monthModalClose = document.getElementById('monthModalClose');

  function showMonthDetail(key, nomMois){
    monthModalTitle.textContent = `${nomMois} ${currentYear}`;

    const people = [];
    let total = 0;

    allDimesCache.forEach((data) => {
      const mois = data.mois || {};
      if (mois[key] !== undefined && mois[key] !== null) {
        const montant = parseFloat(mois[key]) || 0;
        total += montant;
        people.push({
          nom: `${data.nom || ''} ${data.prenom || ''}`.trim(),
          montant,
          membreId: data.membreId || ''
        });
      }
    });

    people.sort((a, b) => a.nom.localeCompare(b.nom));

    if (people.length === 0) {
      monthModalBody.innerHTML = '<p style="text-align:center;color:#9A9182;font-size:13.5px;padding:20px;">Aucun paiement enregistré pour ce mois.</p>';
    } else {
      monthModalBody.innerHTML = people.map((p) => `
        <div class="month-person-row" data-membre-id="${p.membreId}" style="cursor:pointer;">
          <span class="month-person-name">${p.nom}</span>
          <span class="month-person-amount">${formatMontant(p.montant)}</span>
        </div>
      `).join('') + `
        <div class="month-modal-total">
          <span>Total du mois</span>
          <span>${formatMontant(total)}</span>
        </div>
      `;

      monthModalBody.querySelectorAll('.month-person-row').forEach((row) => {
        row.addEventListener('click', () => {
          const membreId = row.dataset.membreId;
          if (membreId) {
            window.location.href = `dime-ajouter.html?membreId=${encodeURIComponent(membreId)}`;
          }
        });
      });
    }

    monthModalOverlay.classList.add('show');
  }

  monthModalClose.addEventListener('click', () => {
    monthModalOverlay.classList.remove('show');
  });

  monthModalOverlay.addEventListener('click', (e) => {
    if (e.target === monthModalOverlay) {
      monthModalOverlay.classList.remove('show');
    }
  });

  let allDimesCache = [];

  async function getMonthlyTotals(){
    // Initialise les 12 totaux à 0
    const totals = {};
    for (let i = 1; i <= 12; i++) {
      totals[String(i).padStart(2, '0')] = 0;
    }

    allDimesCache = [];

    try {
      const q = query(collection(db, 'dimes'), where('annee', '==', currentYear));
      const snapshot = await getDocs(q);

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        allDimesCache.push(data);
        const mois = data.mois || {};
        Object.keys(mois).forEach((key) => {
          if (totals[key] !== undefined) {
            totals[key] += parseFloat(mois[key]) || 0;
          }
        });
      });
    } catch (err) {
      console.error(err);
    }

    return totals;
  }

  async function renderMonths(){
    yearDisplay.textContent = currentYear;
    monthsWrap.innerHTML = '<p style="text-align:center;color:#9A9182;font-size:13px;padding:12px;">Chargement...</p>';

    const totals = await getMonthlyTotals();
    monthsWrap.innerHTML = '';

    let totalGeneral = 0;

    MOIS.forEach((nomMois, index) => {
      const key = String(index + 1).padStart(2, '0');
      const montantMois = totals[key] || 0;
      totalGeneral += montantMois;

      const row = document.createElement('div');
      row.className = 'month-row';
      row.style.cursor = 'pointer';
      row.innerHTML = `
        <span class="month-name">${nomMois}</span>
        <span class="month-total">${formatMontant(montantMois)}</span>
      `;
      row.addEventListener('click', () => {
        showMonthDetail(key, nomMois);
      });
      monthsWrap.appendChild(row);
    });

    totalAmount.textContent = formatMontant(totalGeneral);
  }

  prevYearBtn.addEventListener('click', () => {
    currentYear -= 1;
    renderMonths();
  });

  nextYearBtn.addEventListener('click', () => {
    currentYear += 1;
    renderMonths();
  });

  btnAddDime.addEventListener('click', () => {
    window.location.href = 'dime-ajouter.html';
  });

  renderMonths();
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
