<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Offrande — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1F44">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  /* Fond de page plus sombre et plus élégant, thème mauve profond pour cette page */
  body{
    background: linear-gradient(160deg, #241531 0%, #170D22 55%, #140A1D 100%) !important;
  }

  /* Textes du haut de page adaptés au fond sombre */
  .section-title{ color:#F5EEFC !important; font-size:26px !important; }
  .section-sub{ color:#C9B4E0 !important; font-size:17px !important; }
  .page-footer{ color:#8E7AA6 !important; font-size:13.5px !important; }

  .form-card{
    width:100%;
    max-width:520px;
    padding:0 20px 8px;
  }

  .form-card form{
    background:#fff;
    border-radius:18px;
    padding:26px 22px 28px;
    box-shadow:0 20px 45px -18px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
  }

  .form-row-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .field-label{
    font-size:16px !important;
  }

  /* --- Champs Date et Type : style professionnel --- */
  #ofDate, #ofType, #filterType, #filterMonth{
    appearance:none;
    -webkit-appearance:none;
    width:100%;
    background-color:#FBF9FD;
    background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none'%3E%3Cpath d='M5 7.5L10 12.5L15 7.5' stroke='%236B2EA0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position:right 14px center;
    background-size:16px;
    border:2px solid #E3D8ED;
    border-radius:12px;
    padding:14px 40px 14px 16px;
    font-size:17px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  #ofDate{ cursor:text; padding-right:16px; }
  #ofDate::-webkit-calendar-picker-indicator{
    filter:invert(24%) sepia(54%) saturate(1400%) hue-rotate(240deg);
    cursor:pointer;
  }
  #ofType optgroup{ font-weight:700; color:#6B2EA0; }
  #ofType option{ font-weight:500; color:var(--ink); }

  #ofDate:focus, #ofType:focus, #filterType:focus, #filterMonth:focus{
    outline:none;
    border-color:#6B2EA0;
    box-shadow:0 0 0 4px rgba(107,46,160,0.14);
  }

  .btn-enregistrer{
    width:100%;
    margin-top:20px;
    padding:17px;
    background:linear-gradient(165deg, #34906A 0%, var(--success) 100%);
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:17px;
    font-weight:700;
    letter-spacing:0.03em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 6px 16px -6px rgba(46,125,91,0.5);
    transition:transform 0.12s ease, box-shadow 0.2s ease;
  }

  .btn-enregistrer:hover{transform:translateY(-2px);box-shadow:0 10px 22px -8px rgba(46,125,91,0.55);}
  .btn-enregistrer:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

  /* Liste des offrandes — Historique */
  .list-section{
    width:100%;
    max-width:520px;
    padding:24px 20px 8px;
  }

  .list-title{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:20px;
    color:var(--gold-light);
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin-bottom:14px;
  }

  .filter-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:16px;
  }

  .filter-row select{
    font-size:15.5px;
    padding:12px 38px 12px 14px;
    border-radius:24px;
  }

  .offrande-item{
    background:linear-gradient(160deg, #ffffff 0%, #fbf8fd 100%);
    border:1.5px solid rgba(255,255,255,0.5);
    border-left:5px solid #6B2E8C;
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:12px;
    box-shadow:0 10px 26px -14px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    gap:7px;
    position:relative;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .offrande-item:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 30px -12px rgba(0,0,0,0.55);
  }

  .offrande-item-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }

  .offrande-type-wrap{
    display:flex; align-items:center; gap:9px;
  }

  .offrande-icon{
    width:34px; height:34px; flex-shrink:0;
    border-radius:50%;
    background:var(--purple-light);
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
  }

  .offrande-type{
    font-size:16.5px;
    font-weight:700;
    color:var(--navy-deep);
  }

  .offrande-montant{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:18.5px;
    color:#fff;
    white-space:nowrap;
    background:linear-gradient(155deg,#6B2E8C,#4A1F63);
    padding:5px 14px;
    border-radius:20px;
  }

  .offrande-date{
    font-size:14px;
    font-weight:600;
    color:#9A9182;
    padding-left:43px;
  }

  .offrande-note{
    font-size:14.5px;
    color:#6B6457;
    font-style:italic;
    padding-left:43px;
  }

  .offrande-delete{
    position:absolute;
    top:12px;
    right:12px;
    background:none;
    border:none;
    color:#D8C9B0;
    font-size:19px;
    cursor:pointer;
    padding:2px 6px;
    border-radius:4px;
    transition:color 0.15s ease;
    display:none;
  }

  .offrande-item:hover .offrande-delete{display:block;}
  .offrande-delete:hover{color:var(--error);}

  .total-wrap{
    width:100%;
    max-width:520px;
    padding:14px 20px 36px;
  }

  .total-card{
    background:linear-gradient(155deg, #6B2E8C 0%, #3B1848 100%);
    border:1px solid rgba(232,203,128,0.35);
    border-radius:14px;
    padding:20px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 16px 34px -14px rgba(0,0,0,0.6);
  }

  .total-label{
    font-size:15.5px;
    font-weight:600;
    color:rgba(255,255,255,0.75);
    letter-spacing:0.04em;
    text-transform:uppercase;
  }

  .total-amount{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:27px;
    color:#F3D98A;
  }

  .empty-state{
    text-align:center;
    padding:30px 16px;
    color:#B9A9CC;
    font-size:16px;
  }

  .status-msg{
    display:none;
    margin-top:14px;
    padding:13px 15px;
    border-radius:10px;
    font-size:15.5px;
    font-weight:500;
  }
  .status-msg.show{display:block;}
  .status-msg.ok{background:#F2F9F5;border-left:3px solid var(--success);color:var(--success);}
  .status-msg.err{background:#FBEDE8;border-left:3px solid var(--error);color:var(--error);}
  .status-msg.info{background:#F2F5FA;border-left:3px solid var(--navy-mid);color:var(--navy-mid);}

/* --- Effet 3D (relief) ajoute automatiquement --- */
.btn-enregistrer{
  border-bottom: 4px solid rgba(0,0,0,0.28) !important;
  transition: transform .1s ease, box-shadow .1s ease, filter .1s ease !important;
}
.btn-enregistrer:active{
  transform: translateY(3px) !important;
  border-bottom-width: 2px !important;
  filter: brightness(0.97);
}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">← Retour</a>
  <div class="seal"><img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie"></div>
  <h1>Église de Dieu de la Prophétie</h1>
  <p>Waney 93</p>
</div>

<p class="section-title">Offrande</p>
<p class="section-sub">Enregistrer une offrande ou un don</p>

<!-- Formulaire -->
<div class="form-card">
  <form id="ofrandeForm" autocomplete="off">

    <div class="form-row-2">
      <div class="field-group">
        <label class="field-label" for="ofDate">Date</label>
        <input type="date" id="ofDate" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="ofType">Type</label>
        <select id="ofType" required>
          <option value="" disabled selected>Choisir...</option>
          <optgroup label="Offrandes régulières">
            <option value="Dimanche matin">Dimanche matin</option>
            <option value="Dimanche soir">Dimanche soir</option>
            <option value="Mardi étude">Mardi étude</option>
            <option value="Jeudi Calme-Tempête">Jeudi Calme-Tempête</option>
            <option value="École du dimanche">École du dimanche</option>
          </optgroup>
          <optgroup label="Services spéciaux">
            <option value="Réveil">Réveil</option>
            <option value="Semaine de prière">Semaine de prière</option>
            <option value="Jeûne">Jeûne</option>
            <option value="Veillée de nuit">Veillée de nuit</option>
          </optgroup>
          <optgroup label="Autres">
            <option value="Don">Don</option>
            <option value="Autre">Autre</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="ofMontant">Montant (HTG)</label>
      <input type="number" id="ofMontant" min="0" step="1" placeholder="0" required>
    </div>

    <div class="field-group">
      <label class="field-label" for="ofNote">Note (optionnel)</label>
      <input type="text" id="ofNote" placeholder="Ex. : Don de Jean Pierre, offrande spéciale...">
    </div>

    <button type="submit" class="btn-enregistrer" id="btnSave">Enregistrer</button>
    <div class="status-msg" id="statusMsg"></div>
  </form>
</div>

<!-- Filtres + liste -->
<div class="list-section">
  <p class="list-title">Historique</p>
  <div class="filter-row">
    <select id="filterType">
      <option value="">Tous les types</option>
      <option value="Dimanche matin">Dimanche matin</option>
      <option value="Dimanche soir">Dimanche soir</option>
      <option value="Mardi étude">Mardi étude</option>
      <option value="Jeudi Calme-Tempête">Jeudi Calme-Tempête</option>
      <option value="École du dimanche">École du dimanche</option>
      <option value="Réveil">Réveil</option>
      <option value="Semaine de prière">Semaine de prière</option>
      <option value="Jeûne">Jeûne</option>
      <option value="Veillée de nuit">Veillée de nuit</option>
      <option value="Don">Don</option>
      <option value="Autre">Autre</option>
    </select>
    <select id="filterMonth">
      <option value="">Tous les mois</option>
      <option value="01">Janvier</option>
      <option value="02">Février</option>
      <option value="03">Mars</option>
      <option value="04">Avril</option>
      <option value="05">Mai</option>
      <option value="06">Juin</option>
      <option value="07">Juillet</option>
      <option value="08">Août</option>
      <option value="09">Septembre</option>
      <option value="10">Octobre</option>
      <option value="11">Novembre</option>
      <option value="12">Décembre</option>
    </select>
  </div>
  <div id="listWrap"></div>
</div>

<div class="total-wrap">
  <div class="total-card">
    <span class="total-label">Total affiché</span>
    <span class="total-amount" id="totalAmount">0 HTG</span>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    query,
    orderBy,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaNOl7j9xReumR69PIiyTPrwncJ7-ysG8",
    authDomain: "tresor-de-l-eglise.firebaseapp.com",
    projectId: "tresor-de-l-eglise",
    storageBucket: "tresor-de-l-eglise.firebasestorage.app",
    messagingSenderId: "702537717579",
    appId: "1:702537717579:web:e1e8726ab66a89b355face"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  if (sessionStorage.getItem('trezoLoggedIn') !== 'true') {
    window.location.href = 'index.html';
  }

  // Mettre la date d'aujourd'hui par défaut
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('ofDate').value = today;

  const form = document.getElementById('ofrandeForm');
  const btnSave = document.getElementById('btnSave');
  const statusMsg = document.getElementById('statusMsg');
  const listWrap = document.getElementById('listWrap');
  const totalAmount = document.getElementById('totalAmount');
  const filterType = document.getElementById('filterType');
  const filterMonth = document.getElementById('filterMonth');

  // Initialise le filtre mois sur le mois actuel
  filterMonth.value = String(new Date().getMonth() + 1).padStart(2, '0');

  let allOffrandes = [];

  function showStatus(msg, type){
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg show ' + type;
    if (type === 'ok') setTimeout(() => statusMsg.classList.remove('show'), 3000);
  }

  function formatMontant(m){
    return Number(m).toLocaleString('fr-FR') + ' HTG';
  }

  function formatDate(dateStr){
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function getTypeIcon(type){
    const t = (type || '').toLowerCase();
    if (t.includes('dimanche')) return '🙏';
    if (t.includes('mardi') || t.includes('école')) return '📖';
    if (t.includes('réveil') || t.includes('veillée')) return '✨';
    if (t.includes('prière') || t.includes('jeûne')) return '🕊️';
    if (t.includes('don')) return '🎁';
    return '⭐';
  }

  function renderList(){
    const typeFilter = filterType.value;
    const monthFilter = filterMonth.value;

    const filtered = allOffrandes.filter(o => {
      const matchType = !typeFilter || o.type === typeFilter;
      const matchMonth = !monthFilter || (o.date && o.date.slice(5, 7) === monthFilter);
      return matchType && matchMonth;
    });

    // Tri par date décroissante
    filtered.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    listWrap.innerHTML = '';

    if (filtered.length === 0) {
      listWrap.innerHTML = '<p class="empty-state">Aucune offrande trouvée.</p>';
      totalAmount.textContent = formatMontant(0);
      return;
    }

    let total = 0;

    filtered.forEach(o => {
      total += Number(o.montant) || 0;

      const item = document.createElement('div');
      item.className = 'offrande-item';
      item.innerHTML = `
        <div class="offrande-item-top">
          <div class="offrande-type-wrap">
            <span class="offrande-icon">${getTypeIcon(o.type)}</span>
            <span class="offrande-type">${o.type || ''}</span>
          </div>
          <span class="offrande-montant">${formatMontant(o.montant)}</span>
        </div>
        <span class="offrande-date">${formatDate(o.date)}</span>
        ${o.note ? `<span class="offrande-note">${o.note}</span>` : ''}
        <button class="offrande-delete" data-id="${o.id}" title="Supprimer">✕</button>
      `;

      item.querySelector('.offrande-delete').addEventListener('click', async (e) => {
        e.stopPropagation();
        const confirmed = confirm(`Supprimer cette offrande (${o.type} — ${formatMontant(o.montant)}) ?`);
        if (!confirmed) return;
        try {
          await deleteDoc(doc(db, 'offrandes', o.id));
          allOffrandes = allOffrandes.filter(x => x.id !== o.id);
          renderList();
        } catch (err) {
          alert('Erreur lors de la suppression : ' + err.message);
        }
      });

      listWrap.appendChild(item);
    });

    totalAmount.textContent = formatMontant(total);
  }

  async function loadOffrandes(){
    listWrap.innerHTML = '<p class="empty-state">Chargement...</p>';
    try {
      const snapshot = await getDocs(collection(db, 'offrandes'));
      allOffrandes = [];
      snapshot.forEach(docSnap => {
        allOffrandes.push({ id: docSnap.id, ...docSnap.data() });
      });
      renderList();
    } catch (err) {
      listWrap.innerHTML = '<p class="empty-state">Erreur : ' + err.message + '</p>';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btnSave.disabled = true;
    showStatus('Enregistrement en cours...', 'info');

    try {
      const data = {
        date: document.getElementById('ofDate').value,
        type: document.getElementById('ofType').value,
        montant: parseFloat(document.getElementById('ofMontant').value) || 0,
        note: document.getElementById('ofNote').value.trim() || null,
        creeLe: serverTimestamp()
      };

      const docRef = await addDoc(collection(db, 'offrandes'), data);
      allOffrandes.push({ id: docRef.id, ...data });
      renderList();

      // Réinitialiser le formulaire (garder date et type)
      document.getElementById('ofMontant').value = '';
      document.getElementById('ofNote').value = '';
      showStatus('Offrande enregistrée avec succès.', 'ok');
    } catch (err) {
      showStatus('Erreur : ' + err.message, 'err');
    } finally {
      btnSave.disabled = false;
    }
  });

  filterType.addEventListener('change', renderList);
  filterMonth.addEventListener('change', renderList);

  loadOffrandes();
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
