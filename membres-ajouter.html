<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Enregistrer un membre — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1F44">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  /* 1. FOND DE PAGE CLARIFIÉ ET PLUS LISIBLE (FÒSE SOU STYLE.CSS) */
  body {
    background: linear-gradient(160deg, #F4F0FA 0%, #EAE3F2 55%, #DFD5EB 100%) !important;
    color: #241531 !important;
  }

  /* Tèks anlè yo ki vin pi gwo epi ki adapte ak bèl fond lan */
  .section-title { color:#3A1848 !important; font-size:28px !important; font-weight:700 !important; text-align:center; }
  .section-sub { color:#6B2E8C !important; font-size:18px !important; font-weight:600 !important; text-align:center; margin-bottom:20px; }

  /* Bwat fòm nan ki vin pi laj epi ki pran bèl lonbraj */
  .form-wrap {
    width:100%;
    max-width:540px;
    padding:26px 22px 28px !important;
    margin: 0 auto;
    background:#ffffff !important;
    border-radius:18px !important;
    box-shadow:0 15px 35px -12px rgba(58,24,72,0.15), 0 0 0 1px rgba(0,0,0,0.04) !important;
  }

  /* --- PATI FOTO A --- */
  .photo-wrap{
    width:100%;
    max-width:480px;
    padding:0 24px 14px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .photo-preview{
    width:130px;
    height:130px;
    border-radius:50%;
    border:3px solid #6B2EA0 !important;
    background:#FBF9FD;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-bottom:14px;
    box-shadow:0 4px 12px rgba(107,46,160,0.15);
  }

  .photo-preview img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .photo-preview .photo-placeholder{
    font-size:44px;
    color:#B8AE94;
  }

  .photo-input-label{
    display:inline-block;
    padding:11px 22px;
    background:#F5EEFC !important;
    border:2px solid #E3D8ED !important;
    border-radius:24px;
    font-size:16px !important;
    font-weight:600;
    color:#6B2EA0 !important;
    cursor:pointer;
    transition:all 0.2s ease;
  }

  .photo-input-label:hover{
    border-color:#6B2EA0 !important;
    background:#6B2EA0 !important;
    color:#fff !important;
  }

  #photoInput{display:none;}

  /* --- AGRANDISMAN LABELS AK INPUT YO --- */
  .field-label {
    font-size:17px !important;
    color: #3A1848 !important;
    font-weight: 600 !important;
    margin-bottom: 8px !important;
    display: block !important;
  }

  #nom, #prenom, #dateNaissance, #dateConvention, #dateBapteme, #telephone, #fonction, #conditionMatrimoniale, #nifCin {
    background-color:#FBF9FD !important;
    color: #241531 !important;
    border: 2px solid #E3D8ED !important;
    font-family:'Inter', sans-serif !important;
    font-size:17px !important;
    font-weight:600 !important;
    border-radius:12px !important;
    padding:14px 16px !important;
    width: 100% !important;
    box-sizing: border-box !important;
    transition: border-color .15s ease, box-shadow .15s ease !important;
  }

  #nom:focus, #prenom:focus, #dateNaissance:focus, #dateConvention:focus, #dateBapteme:focus, #telephone:focus, #fonction:focus, #conditionMatrimoniale:focus, #nifCin:focus {
    outline:none !important;
    border-color:#6B2EA0 !important;
    box-shadow:0 0 0 4px rgba(107,46,160,0.14) !important;
    background-color:#ffffff !important;
  }

  /* Pou bwat Opsyon Sèks la parèt pi gwo */
  .sexe-group {
    display: flex;
    gap: 20px;
    margin-top: 4px;
  }
  .sexe-option {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sexe-option input[type="radio"] {
    width: 22px !important;
    height: 22px !important;
    accent-color: #6B2EA0;
    cursor: pointer;
  }
  .sexe-option label {
    font-size: 18px !important;
    font-weight: 600;
    color: #241531;
    cursor: pointer;
  }

  /* Style bwat Select (Condition matrimoniale) */
  #conditionMatrimoniale {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none'%3E%3Cpath d='M5 7.5L10 12.5L15 7.5' stroke='%236B2EA0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") !important;
    background-repeat: no-repeat !important;
    background-position: right 14px center !important;
    background-size: 16px !important;
    padding-right: 40px !important;
    cursor: pointer;
  }

  /* --- STYLES POU BOUTON YO --- */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .btn {
    flex: 1;
    padding: 16px !important;
    font-size: 17px !important;
    font-weight: 700 !important;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    border-radius: 12px !important;
    cursor: pointer;
    transition: all 0.15s ease !important;
  }

  .btn-save {
    background: linear-gradient(165deg, #34906A 0%, #2E7D5B 100%) !important;
    color: #fff !important;
    border: none;
    border-bottom: 4px solid rgba(0,0,0,0.25) !important;
    box-shadow: 0 6px 16px -6px rgba(46,125,91,0.5);
  }
  .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 22px -8px rgba(46,125,91,0.55); }
  .btn-save:active { transform: translateY(3px) !important; border-bottom-width: 1px !important; }

  .btn-edit {
    background: linear-gradient(165deg, #4A90E2 0%, #2B6CB0 100%) !important;
    color: #fff !important;
    border: none;
    border-bottom: 4px solid rgba(0,0,0,0.25) !important;
  }
  .btn-edit:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; border-bottom-width: 4px !important; }
  .btn-edit:not(:disabled):hover { transform: translateY(-2px); }
  .btn-edit:not(:disabled):active { transform: translateY(3px) !important; border-bottom-width: 1px !important; }

  .btn-back {
    background: #ebe4f3 !important;
    color: #6B2EA0 !important;
    border: 2px solid #D6C2E8 !important;
    font-weight: 600 !important;
  }
  .btn-back:hover { background: #E3D2F4 !important; }

  .status-msg {
    display:none; margin-top:16px; padding:14px 16px; border-radius:10px; font-size:16px; font-weight:600;
  }
  .status-msg.show {display:block;}
  .status-msg.ok {background:#F2F9F5;border-left:4px solid #1A7A4A;color:#1A7A4A;}
  .status-msg.err {background:#FBEDE8;border-left:4px solid #C0392B;color:#C0392B;}
  .status-msg.info {background:#F2F5FA;border-left:4px solid #1A3A72;color:#1A3A72;}
</style>
</head>
<body>

<div class="page-header">
  <a href="membres.html" class="back-link">← Retour</a>
  <div class="seal"><img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie"></div>
  <h1>Église de Dieu de la Prophétie</h1>
  <p>Waney 93</p>
</div>

<p class="section-title">Enregistrer un membre</p>
<p class="section-sub" id="modeIndicator">Nouvel enregistrement</p>

<div class="form-wrap">
  <div class="photo-wrap">
    <div class="photo-preview" id="photoPreview">
      <span class="photo-placeholder">👤</span>
    </div>
    <label class="photo-input-label" for="photoInput">Choisir une photo</label>
    <input type="file" id="photoInput" accept="image/*">
  </div>

  <form id="membreForm" autocomplete="off">

    <div class="field-group">
      <label class="field-label" for="nom">Nom</label>
      <input type="text" id="nom" name="nom" required>
    </div>

    <div class="field-group">
      <label class="field-label" for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom" required>
    </div>

    <div class="field-group">
      <label class="field-label" for="dateNaissance">Date de naissance</label>
      <input type="date" id="dateNaissance" name="dateNaissance">
    </div>

    <div class="field-group">
      <label class="field-label">Sexe</label>
      <div class="sexe-group">
        <div class="sexe-option">
          <input type="radio" id="sexeM" name="sexe" value="M" required>
          <label for="sexeM">M</label>
        </div>
        <div class="sexe-option">
          <input type="radio" id="sexeF" name="sexe" value="F" required>
          <label for="sexeF">F</label>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="dateConvention">Date convention</label>
      <input type="date" id="dateConvention" name="dateConvention">
    </div>

    <div class="field-group">
      <label class="field-label" for="dateBapteme">Date du baptême</label>
      <input type="date" id="dateBapteme" name="dateBapteme">
    </div>

    <div class="field-group">
      <label class="field-label" for="telephone">Téléphone</label>
      <input type="text" id="telephone" name="telephone" placeholder="Ex. : 3712-3456">
    </div>

    <div class="field-group">
      <label class="field-label" for="fonction">Fonction</label>
      <input type="text" id="fonction" name="fonction" placeholder="Ex. : Membre, Diacre, Pasteur...">
    </div>

    <div class="field-group">
      <label class="field-label" for="conditionMatrimoniale">Condition matrimoniale</label>
      <select id="conditionMatrimoniale" name="conditionMatrimoniale">
        <option value="" disabled selected>Sélectionner...</option>
        <option value="Marié(e)">Marié(e)</option>
        <option value="Divorcé(e)">Divorcé(e)</option>
        <option value="Séparé(e)">Séparé(e)</option>
        <option value="Célibataire">Célibataire</option>
        <option value="Veuf(ve)">Veuf(ve)</option>
        <option value="Union libre">Union libre</option>
      </select>
    </div>

    <div class="field-group">
      <label class="field-label" for="nifCin">NIF/CIN</label>
      <input type="text" id="nifCin" name="nifCin" placeholder="Numéro NIF ou CIN">
    </div>

    <input type="hidden" id="membreId" value="">

    <div class="btn-row">
      <button type="submit" class="btn btn-save" id="btnSave">Enregistrer</button>
      <button type="button" class="btn btn-edit" id="btnEdit" disabled>Modifier</button>
    </div>
    <div class="btn-row">
      <button type="button" class="btn btn-back" id="btnBack">Retour</button>
    </div>

    <div class="status-msg" id="statusMsg"></div>
  </form>
</div>

<!-- Firebase SDK (version CDN, compatible fichier HTML simple) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    updateDoc,
    doc,
    serverTimestamp,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaNOl7j9xReumR69PIiyTPrwncJ7-ysG8",
    authDomain: "tresor-de-l-eglise.firebaseapp.com",
    projectId: "tresor-de-l-eglise",
    storageBucket: "tresor-de-l-eglise.firebasestorage.app",
    messagingSenderId: "702537717579",
    appId: "1:702537717579:web:e1e8726ab66a89b355face"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Sécurité : on vérifie que l'utilisateur est bien connecté
  if (sessionStorage.getItem('trezoLoggedIn') !== 'true') {
    window.location.href = 'index.html';
  }

  const form = document.getElementById('membreForm');
  const btnSave = document.getElementById('btnSave');
  const btnEdit = document.getElementById('btnEdit');
  const btnBack = document.getElementById('btnBack');
  const statusMsg = document.getElementById('statusMsg');
  const membreIdInput = document.getElementById('membreId');
  const modeIndicator = document.getElementById('modeIndicator');
  const photoInput = document.getElementById('photoInput');
  const photoPreview = document.getElementById('photoPreview');

  let photoBase64 = null;

  // Compresse l'image (redimensionne + réduit la qualité) pour qu'elle
  // tienne facilement dans un document Firestore (limite : 1 Mo par document)
  function compressImage(file, maxSize = 300, quality = 0.7){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;

          if (width > height && width > maxSize) {
            height = Math.round(height * (maxSize / width));
            width = maxSize;
          } else if (height > maxSize) {
            width = Math.round(width * (maxSize / height));
            height = maxSize;
          }

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  photoInput.addEventListener('change', async () => {
    const file = photoInput.files[0];
    if (!file) return;

    try {
      photoBase64 = await compressImage(file);
      photoPreview.innerHTML = `<img src="${photoBase64}" alt="Photo du membre">`;
    } catch (err) {
      console.error(err);
      showStatus("Erreur lors du traitement de la photo : " + err.message, 'err');
    }
  });

  function showStatus(message, type){
    statusMsg.textContent = message;
    statusMsg.className = 'status-msg show ' + type;
  }

  function getFormData(){
    return {
      nom: document.getElementById('nom').value.trim(),
      prenom: document.getElementById('prenom').value.trim(),
      dateNaissance: document.getElementById('dateNaissance').value || null,
      sexe: form.querySelector('input[name="sexe"]:checked')?.value || null,
      dateConvention: document.getElementById('dateConvention').value || null,
      dateBapteme: document.getElementById('dateBapteme').value || null,
      telephone: document.getElementById('telephone').value.trim() || null,
      fonction: document.getElementById('fonction').value.trim() || null,
      conditionMatrimoniale: document.getElementById('conditionMatrimoniale').value || null,
      nifCin: document.getElementById('nifCin').value.trim() || null
    };
  }

  function resetFormToNewMode(){
    membreIdInput.value = '';
    btnEdit.disabled = true;
    btnSave.style.display = '';
    modeIndicator.textContent = 'Nouvel enregistrement';
  }

  // ---------- Chargement automatique depuis l'URL (?membreId=...) ----------

  async function loadMemberFromUrl(){
    const params = new URLSearchParams(window.location.search);
    const membreId = params.get('membreId');
    if (!membreId) return;

    try {
      const snap = await getDoc(doc(db, 'membres', membreId));
      if (!snap.exists()) return;

      const data = snap.data();

      document.getElementById('nom').value = data.nom || '';
      document.getElementById('prenom').value = data.prenom || '';
      document.getElementById('dateNaissance').value = data.dateNaissance || '';
      document.getElementById('dateConvention').value = data.dateConvention || '';
      document.getElementById('dateBapteme').value = data.dateBapteme || '';
      document.getElementById('telephone').value = data.telephone || '';
      document.getElementById('fonction').value = data.fonction || '';
      document.getElementById('conditionMatrimoniale').value = data.conditionMatrimoniale || '';
      document.getElementById('nifCin').value = data.nifCin || '';

      if (data.sexe === 'M') document.getElementById('sexeM').checked = true;
      if (data.sexe === 'F') document.getElementById('sexeF').checked = true;

      if (data.photo) {
        photoPreview.innerHTML = `<img src="${data.photo}" alt="Photo du membre">`;
      }

      membreIdInput.value = membreId;
      btnEdit.disabled = false;
      btnSave.style.display = 'none';
      modeIndicator.textContent = `Modification de ${data.nom || ''} ${data.prenom || ''}`;
    } catch (err) {
      console.error(err);
      showStatus('Erreur lors du chargement du membre : ' + err.message, 'err');
    }
  }

  loadMemberFromUrl();

  // ENREGISTRER un nouveau membre
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btnSave.disabled = true;
    showStatus('Enregistrement en cours...', 'info');

    try {
      const data = getFormData();
      data.creeLe = serverTimestamp();
      if (photoBase64) data.photo = photoBase64;

      const docRef = await addDoc(collection(db, 'membres'), data);

      membreIdInput.value = docRef.id;
      btnEdit.disabled = false;
      modeIndicator.textContent = 'Membre enregistré — vous pouvez le modifier ci-dessous';
      showStatus('Membre enregistré avec succès.', 'ok');
    } catch (err) {
      console.error(err);
      showStatus("Erreur lors de l'enregistrement : " + err.message, 'err');
    } finally {
      btnSave.disabled = false;
    }
  });

  // MODIFIER le membre qui vient d'être enregistré
  btnEdit.addEventListener('click', async () => {
    const id = membreIdInput.value;
    if (!id) return;

    btnEdit.disabled = true;
    showStatus('Mise à jour en cours...', 'info');

    try {
      const data = getFormData();
      if (photoBase64) data.photo = photoBase64;
      await updateDoc(doc(db, 'membres', id), data);
      showStatus('Membre modifié avec succès.', 'ok');
    } catch (err) {
      console.error(err);
      showStatus('Erreur lors de la modification : ' + err.message, 'err');
    } finally {
      btnEdit.disabled = false;
    }
  });

  // RETOUR vers le menu Membres
  btnBack.addEventListener('click', () => {
    window.location.href = 'membres.html';
  });
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
