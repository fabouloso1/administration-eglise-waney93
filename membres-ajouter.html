<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Enregistrer un membre — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1F44">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  /* STYLING DIWÈK SOU MODÈL IMAJ 1000024286.PNG */
  body {
    background: linear-gradient(160deg, #FFF9EE 0%, #FBEFD8 100%) !important;
    font-family: 'Inter', sans-serif !important;
    margin: 0;
    padding: 0;
    color: #1E3A8A !important;
  }

  /* HEADER BLE MAREN AK LOGO WONN LAN */
  .custom-header {
    background-color: #0B2240 !important;
    padding: 24px 16px;
    text-align: center;
    position: relative;
    border-bottom-left-radius: 24px;
    border-bottom-right-radius: 24px;
  }

  .custom-header .back-arrow {
    position: absolute;
    left: 20px;
    top: 28px;
    color: #ffffff !important;
    text-decoration: none;
    font-size: 22px;
  }

  .custom-header .logo-container {
    width: 65px;
    height: 65px;
    background: #ffffff;
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  .custom-header .logo-container img {
    width: 85%;
    height: 85%;
    object-fit: contain;
  }

  .custom-header h1 {
    color: #ffffff !important;
    font-size: 20px !important;
    font-weight: 600 !important;
    margin: 0;
  }

  /* KAT BLAN KI GEN FÒM NAN */
  .form-container {
    background: #ffffff !important;
    border-radius: 24px !important;
    margin: -15px 16px 30px;
    padding: 24px 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05) !important;
    box-sizing: border-box;
  }

  /* SEKSYON FOTO AK TI PWEN LÒ YO */
  .photo-section {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }

  .photo-clickable-zone {
    width: 110px;
    height: 110px;
    border: 2px dashed #D4AF37 !important; /* Ti pwen lò yo */
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: #F8FAFC;
    overflow: hidden;
  }

  .photo-clickable-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-clickable-zone svg {
    width: 28px;
    height: 28px;
    fill: #718096;
    margin-bottom: 4px;
  }

  .photo-clickable-zone span {
    font-size: 12px;
    color: #718096;
    font-weight: 500;
  }

  /* KIJAN INPUT AK LABELS YO RANJE (DE PAR DE OUBYEN TOUT SÈL) */
  .form-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .form-group.full-width {
    width: 100%;
  }

  .form-label {
    font-size: 14px !important;
    font-weight: 600 !important;
    color: #1E3A8A !important;
    margin-bottom: 6px;
  }

  /* STYLING ENTRÉE TEXTE AK SELECT YO */
  .form-input, .form-select {
    width: 100%;
    padding: 12px 16px !important;
    font-size: 16px !important;
    font-weight: 500;
    color: #334155 !important;
    background-color: #ffffff !important;
    border: 1.5px solid #E2E8F0 !important;
    border-radius: 14px !important;
    box-sizing: border-box;
    transition: all 0.2s ease;
  }

  .form-input:focus, .form-select:focus {
    outline: none !important;
    border-color: #1E3A8A !important;
    box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1) !important;
  }

  /* Diferansye bwat kote yo mande Lieu de naissance lan */
  .gold-border {
    border: 2.5px solid #D4AF37 !important;
  }

  /* BOUTON SEKS (H / F) TOUT WONN YO */
  .sexe-toggle-container {
    display: flex;
    background: #F1F5F9;
    border-radius: 14px;
    padding: 4px;
  }

  .sexe-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 0;
    font-size: 16px;
    font-weight: 600;
    color: #64748B;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sexe-btn.active {
    background: #1E3A8A !important;
    color: #ffffff !important;
  }

  /* BOUTON AKSYON GRADIENT AK LONBRAJ BÈL YO */
  .action-buttons {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn-submit {
    width: 100%;
    background: linear-gradient(180deg, #10B981 0%, #047857 100%) !important;
    color: white !important;
    padding: 16px;
    font-size: 16px !important;
    font-weight: 600 !important;
    border: none;
    border-radius: 18px !important;
    cursor: pointer;
    box-shadow: 0 8px 16px rgba(4, 120, 87, 0.3) !important;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn-submit:active {
    transform: scale(0.98);
    box-shadow: 0 4px 8px rgba(4, 120, 87, 0.2) !important;
  }

  .btn-cancel {
    width: 100%;
    background: linear-gradient(180deg, #94A3B8 0%, #475569 100%) !important;
    color: white !important;
    padding: 16px;
    font-size: 16px !important;
    font-weight: 600 !important;
    border: none;
    border-radius: 18px !important;
    cursor: pointer;
    box-shadow: 0 8px 16px rgba(71, 85, 105, 0.3) !important;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn-cancel:active {
    transform: scale(0.98);
    box-shadow: 0 4px 8px rgba(71, 85, 105, 0.2) !important;
  }

  .status-msg {
    display: none;
    margin-top: 14px;
    padding: 12px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
  }
  .status-msg.show { display: block; }
  .status-msg.ok { background: #DCFCE7; color: #15803D; }
  .status-msg.err { background: #FEE2E2; color: #B91C1C; }
  .status-msg.info { background: #DBEAFE; color: #1D4ED8; }

  /* --- Liste "Condition matrimoniale" personnalisée --- */
  .custom-select-wrapper{
    position: relative;
    user-select: none;
  }
  .custom-select-trigger{
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px !important;
    font-size: 16px !important;
    font-weight: 500;
    color: #334155 !important;
    background-color: #ffffff !important;
    border: 1.5px solid #E2E8F0 !important;
    border-radius: 14px !important;
    box-sizing: border-box;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .custom-select-trigger.placeholder{ color: #94A3B8 !important; }
  .custom-select-trigger:after{
    content: "";
    width: 0; height: 0; flex-shrink: 0; margin-left: 8px;
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 6px solid #D4AF37;
    transition: transform 0.2s ease;
  }
  .custom-select-wrapper.open .custom-select-trigger{
    border-color: #1E3A8A !important;
    box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1) !important;
  }
  .custom-select-wrapper.open .custom-select-trigger:after{ transform: rotate(180deg); }

  .custom-options{
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    width: 240px;
    max-width: calc(100vw - 64px);
    background: #ffffff;
    border: 1.5px solid #D4AF37;
    border-radius: 14px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 200;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-8px);
    transition: all 0.15s ease;
    box-shadow: 0 12px 28px rgba(30,58,138,0.15);
  }
  .custom-select-wrapper.open .custom-options{
    opacity: 1; visibility: visible; transform: translateY(0);
  }
  .custom-option{
    padding: 12px 16px;
    font-size: 15.5px;
    font-weight: 500;
    color: #334155;
    cursor: pointer;
    transition: background 0.1s ease;
  }
  .custom-option:hover{ background: #FBEFD8; color: #1E3A8A; }
</style>
</head>
<body>

<!-- HEADER TOUT BLE LAN AK TI FLÈCH RETOU -->
<div class="custom-header">
  <a href="membres.html" class="back-arrow">←</a>
  <div class="logo-container">
    <img src="images.jpeg" alt="Logo">
  </div>
  <h1 id="modeIndicator">Nouveau membre</h1>
</div>

<!-- KAT BLAN FÒM NAN -->
<div class="form-container">
  
  <!-- SÈK FOTO TI PWEN LÒ -->
  <div class="photo-section">
    <label for="photoInput" class="photo-clickable-zone" id="photoPreview">
      <svg viewBox="0 0 24 24">
        <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
      </svg>
      <span>Photo</span>
    </label>
    <input type="file" id="photoInput" accept="image/*" style="display: none;">
  </div>

  <form id="membreForm" autocomplete="off">
    
    <!-- PRÉNOM / NOM -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prénom *</label>
        <input type="text" id="prenom" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Nom *</label>
        <input type="text" id="nom" class="form-input" required>
      </div>
    </div>

    <!-- SEXE / DATE NAISSANCE -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Sexe</label>
        <div class="sexe-toggle-container">
          <button type="button" class="sexe-btn active" id="btnSexeM">H</button>
          <button type="button" class="sexe-btn" id="btnSexeF">F</button>
        </div>
        <input type="hidden" id="sexeValue" value="M">
      </div>
      <div class="form-group">
        <label class="form-label">Date Naissance</label>
        <input type="date" id="dateNaissance" class="form-input">
      </div>
    </div>

    <!-- LIEU DE NAISSANCE (KAD LÒ) -->
    <div class="form-row">
      <div class="form-group full-width">
        <label class="form-label">Lieu de naissance</label>
        <input type="text" id="lieuNaissance" class="form-input gold-border" placeholder="Ex: Port-au-Prince">
      </div>
    </div>

    <!-- LÒT DAT YO (CONVENTION & BAPTÊME) -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date Convention</label>
        <input type="date" id="dateConvention" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Date du baptême</label>
        <input type="date" id="dateBapteme" class="form-input">
      </div>
    </div>

    <!-- TÉLÉPHONE -->
    <div class="form-row">
      <div class="form-group full-width">
        <label class="form-label">Téléphone</label>
        <input type="text" id="telephone" class="form-input" placeholder="Ex. : 3712-3456">
      </div>
    </div>

    <!-- ADRESSE -->
    <div class="form-row">
      <div class="form-group full-width">
        <label class="form-label">Adresse</label>
        <input type="text" id="adresse" class="form-input" placeholder="Ex: Waney 93, Carrefour">
      </div>
    </div>

    <!-- FONCTION / DATE D'ADHÉSION -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Fonction</label>
        <input type="text" id="fonction" class="form-input" placeholder="Ex. : Membre, Diacre, Pasteur...">
      </div>
      <div class="form-group">
        <label class="form-label">Date d'adhésion</label>
        <input type="date" id="dateAdhesion" class="form-input">
      </div>
    </div>

    <!-- CONDITION MATRIMONIALE / NIF CIN -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Condition Matrimoniale</label>
        <div class="custom-select-wrapper" id="condMatWrapper">
          <div class="custom-select-trigger placeholder" id="condMatTrigger">Sélectionner...</div>
          <div class="custom-options">
            <span class="custom-option" data-value="Marié(e)">Marié(e)</span>
            <span class="custom-option" data-value="Divorcé(e)">Divorcé(e)</span>
            <span class="custom-option" data-value="Séparé(e)">Séparé(e)</span>
            <span class="custom-option" data-value="Célibataire">Célibataire</span>
            <span class="custom-option" data-value="Veuf(ve)">Veuf(ve)</span>
            <span class="custom-option" data-value="Union libre">Union libre</span>
          </div>
        </div>
        <input type="hidden" id="conditionMatrimoniale" value="">
      </div>
      <div class="form-group">
        <label class="form-label">NIF/CIN</label>
        <input type="text" id="nifCin" class="form-input" placeholder="Numéro">
      </div>
    </div>

    <input type="hidden" id="membreId" value="">

    <!-- BOUTON YO KRAZE REKÒ KRAZE PLANÈT -->
    <div class="action-buttons">
      <button type="submit" class="btn-submit" id="btnSave">Enregistrer le membre</button>
      <button type="button" class="btn-cancel" id="btnBack">Annuler</button>
    </div>

    <div class="status-msg" id="statusMsg"></div>
  </form>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    updateDoc,
    doc,
    serverTimestamp,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaNOl7j9xReumR69PIiyTPrwncJ7-ysG8",
    authDomain: "tresor-de-l-eglise.firebaseapp.com",
    projectId: "tresor-de-l-eglise",
    storageBucket: "tresor-de-l-eglise.firebasestorage.app",
    messagingSenderId: "702537717579",
    appId: "1:702537717579:web:e1e8726ab66a89b355face"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  if (sessionStorage.getItem('trezoLoggedIn') !== 'true') {
    window.location.href = 'index.html';
  }

  const form = document.getElementById('membreForm');
  const btnSave = document.getElementById('btnSave');
  const btnBack = document.getElementById('btnBack');
  const statusMsg = document.getElementById('statusMsg');
  const membreIdInput = document.getElementById('membreId');
  const modeIndicator = document.getElementById('modeIndicator');
  const photoInput = document.getElementById('photoInput');
  const photoPreview = document.getElementById('photoPreview');

  // GERE TOGGLE SEKS H / F LAN
  const btnSexeM = document.getElementById('btnSexeM');
  const btnSexeF = document.getElementById('btnSexeF');
  const sexeValue = document.getElementById('sexeValue');

  btnSexeM.addEventListener('click', () => {
    btnSexeM.classList.add('active');
    btnSexeF.classList.remove('active');
    sexeValue.value = "M";
  });

  btnSexeF.addEventListener('click', () => {
    btnSexeF.classList.add('active');
    btnSexeM.classList.remove('active');
    sexeValue.value = "F";
  });

  // Mete dat jodi a otomatikman nan "Date d'adhésion" si l vid
  const dateAdhesionInput = document.getElementById('dateAdhesion');
  if(!dateAdhesionInput.value) {
    const today = new Date().toISOString().split('T')[0];
    dateAdhesionInput.value = today;
  }

  let photoBase64 = null;

  // --- Liste "Condition matrimoniale" personnalisée ---
  const condMatWrapper = document.getElementById('condMatWrapper');
  const condMatTrigger = document.getElementById('condMatTrigger');
  const condMatHidden = document.getElementById('conditionMatrimoniale');

  condMatTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    condMatWrapper.classList.toggle('open');
  });

  condMatWrapper.querySelectorAll('.custom-option').forEach(option => {
    option.addEventListener('click', function(){
      const val = this.getAttribute('data-value');
      condMatTrigger.textContent = val;
      condMatTrigger.classList.remove('placeholder');
      condMatHidden.value = val;
      condMatWrapper.classList.remove('open');
    });
  });

  window.addEventListener('click', (e) => {
    if (!condMatWrapper.contains(e.target)) condMatWrapper.classList.remove('open');
  });

  function setConditionMatrimoniale(val){
    if (val) {
      condMatHidden.value = val;
      condMatTrigger.textContent = val;
      condMatTrigger.classList.remove('placeholder');
    } else {
      condMatHidden.value = '';
      condMatTrigger.textContent = 'Sélectionner...';
      condMatTrigger.classList.add('placeholder');
    }
  }

  function compressImage(file, maxSize = 300, quality = 0.7){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxSize) {
            height = Math.round(height * (maxSize / width));
            width = maxSize;
          } else if (height > maxSize) {
            width = Math.round(width * (maxSize / height));
            height = maxSize;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  photoInput.addEventListener('change', async () => {
    const file = photoInput.files[0];
    if (!file) return;
    try {
      photoBase64 = await compressImage(file);
      photoPreview.innerHTML = `<img src="${photoBase64}" alt="Photo">`;
    } catch (err) {
      console.error(err);
      showStatus("Erreur photo : " + err.message, 'err');
    }
  });

  function showStatus(message, type){
    statusMsg.textContent = message;
    statusMsg.className = 'status-msg show ' + type;
  }

  function getFormData(){
    return {
      nom: document.getElementById('nom').value.trim(),
      prenom: document.getElementById('prenom').value.trim(),
      dateNaissance: document.getElementById('dateNaissance').value || null,
      sexe: sexeValue.value,
      lieuNaissance: document.getElementById('lieuNaissance').value.trim() || null,
      dateConvention: document.getElementById('dateConvention').value || null,
      dateBapteme: document.getElementById('dateBapteme').value || null,
      telephone: document.getElementById('telephone').value.trim() || null,
      adresse: document.getElementById('adresse').value.trim() || null,
      fonction: document.getElementById('fonction').value,
      dateAdhesion: dateAdhesionInput.value || null,
      conditionMatrimoniale: document.getElementById('conditionMatrimoniale').value,
      nifCin: document.getElementById('nifCin').value.trim() || null
    };
  }

  async function loadMemberFromUrl(){
    const params = new URLSearchParams(window.location.search);
    const membreId = params.get('membreId');
    if (!membreId) return;

    try {
      const snap = await getDoc(doc(db, 'membres', membreId));
      if (!snap.exists()) return;
      const data = snap.data();

      document.getElementById('nom').value = data.nom || '';
      document.getElementById('prenom').value = data.prenom || '';
      document.getElementById('dateNaissance').value = data.dateNaissance || '';
      document.getElementById('lieuNaissance').value = data.lieuNaissance || '';
      document.getElementById('dateConvention').value = data.dateConvention || '';
      document.getElementById('dateBapteme').value = data.dateBapteme || '';
      document.getElementById('telephone').value = data.telephone || '';
      document.getElementById('adresse').value = data.adresse || '';
      document.getElementById('fonction').value = data.fonction || 'Membre';
      document.getElementById('dateAdhesion').value = data.dateAdhesion || '';
      setConditionMatrimoniale(data.conditionMatrimoniale || '');
      document.getElementById('nifCin').value = data.nifCin || '';

      if (data.sexe === 'F') {
        btnSexeF.click();
      } else {
        btnSexeM.click();
      }

      if (data.photo) {
        photoPreview.innerHTML = `<img src="${data.photo}" alt="Photo">`;
      }

      membreIdInput.value = membreId;
      btnSave.textContent = "Modifier le membre";
      modeIndicator.textContent = `Modifier le membre`;
    } catch (err) {
      console.error(err);
      showStatus('Erreur chargement : ' + err.message, 'err');
    }
  }

  loadMemberFromUrl();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btnSave.disabled = true;
    showStatus('Traitement en cours...', 'info');

    const id = membreIdInput.value;
    try {
      const data = getFormData();
      if (photoBase64) data.photo = photoBase64;

      if (id) {
        // MÒD MODIFIKASYON
        await updateDoc(doc(db, 'membres', id), data);
        showStatus('Membre modifié avec succès.', 'ok');
      } else {
        // MÒD NOUVO ENREGISTREMENT
        data.creeLe = serverTimestamp();
        await addDoc(collection(db, 'membres'), data);
        showStatus('Membre enregistré avec succès.', 'ok');
        form.reset();
        setConditionMatrimoniale('');
        photoPreview.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg><span>Photo</span>`;
        btnSexeM.click();
      }
    } catch (err) {
      console.error(err);
      showStatus("Erreur : " + err.message, 'err');
    } finally {
      btnSave.disabled = false;
    }
  });

  btnBack.addEventListener('click', () => {
    window.location.href = 'membres.html';
  });
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
