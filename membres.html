<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Membres — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0A1F44;
    --navy-mid:#1B3A6B;
    --gold:#C9A24B;
    --gold-soft:#E4CD8C;
    --cream:#F7F5F0;
    --ink:#2E2E2E;
    --error:#B3432B;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    min-height:100vh;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ===== HEADER ===== */
  .page-header{
    width:100%;
    background:var(--navy-deep);
    padding:24px 28px 22px;
    text-align:center;
    border-bottom:3px solid var(--gold);
    position:relative;
  }

  .page-header::after{
    content:"";
    position:absolute;
    top:-150px;
    right:-150px;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(201,162,75,0.15) 0%, transparent 70%);
    pointer-events:none;
  }

  .back-link{
    position:absolute;
    left:20px;
    top:20px;
    z-index:2;
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--gold-soft);
    font-size:13px;
    font-weight:500;
    text-decoration:none;
    letter-spacing:0.02em;
    padding:6px 10px;
    border:1px solid rgba(228,205,140,0.4);
    border-radius:20px;
    transition:background 0.2s ease;
  }

  .back-link:hover{background:rgba(255,255,255,0.08);}

  .page-header .seal{
    width:50px;height:50px;margin:0 auto 10px;
    display:flex;align-items:center;justify-content:center;
    position:relative;z-index:1;
  }

  .page-header .seal img{
    width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.35));
  }

  .page-header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    color:var(--cream);
    letter-spacing:0.02em;
    margin-bottom:4px;
    position:relative;z-index:1;
  }

  .page-header p{
    font-size:11.5px;
    color:var(--gold-soft);
    letter-spacing:0.07em;
    text-transform:uppercase;
    position:relative;z-index:1;
  }

  .section-title{
    width:100%;
    text-align:center;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:18px;
    color:var(--navy-deep);
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:22px 0 6px;
  }

  .section-sub{
    width:100%;
    text-align:center;
    font-size:13px;
    color:#6B6457;
    padding-bottom:8px;
  }

  /* ===== GRID DE BOUTONS ===== */
  .action-grid{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:20px 24px 28px;
    max-width:560px;
    width:100%;
    align-content:start;
  }

  .action-btn{
    background:#fff;
    border:1.5px solid #E3DDC9;
    border-radius:3px;
    padding:26px 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    cursor:pointer;
    text-align:center;
    transition:border-color 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease;
    font-family:'Inter',sans-serif;
    color:var(--navy-deep);
  }

  .action-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px -8px rgba(10,31,68,0.25);
  }

  .action-btn:active{transform:translateY(0);}

  .action-icon{
    width:44px;height:44px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    border-radius:50%;
  }

  .action-label{
    font-size:14.5px;
    font-weight:700;
    color:var(--navy-deep);
    letter-spacing:0.01em;
  }

  .action-sub{
    font-size:12px;
    font-weight:500;
    color:#6B6457;
    letter-spacing:0.02em;
  }

  /* Koulè pèsonalize pou chak bouton */
  .action-btn.c-add{border-top:4px solid #2E7D5B;background:#F2F9F5;}
  .action-btn.c-add .action-icon{background:#fff;border:1.5px solid #A8D6BF;}
  .action-btn.c-add:hover{border-color:#2E7D5B;}

  .action-btn.c-delete{border-top:4px solid #B3432B;background:#FDF6F4;}
  .action-btn.c-delete .action-icon{background:#fff;border:1.5px solid #E3A893;}
  .action-btn.c-delete:hover{border-color:#B3432B;}

  .action-btn.c-search{border-top:4px solid #1B3A6B;background:#F2F5FA;}
  .action-btn.c-search .action-icon{background:#fff;border:1.5px solid #A9BBD9;}
  .action-btn.c-search:hover{border-color:#1B3A6B;}

  .action-btn.c-list{border-top:4px solid #C9A24B;background:#FBF8EF;}
  .action-btn.c-list .action-icon{background:#fff;border:1.5px solid var(--gold-soft);}
  .action-btn.c-list:hover{border-color:#C9A24B;}

  .page-footer{
    width:100%;
    text-align:center;
    padding:18px;
    font-size:12.5px;
    font-weight:500;
    color:#6B6457;
    letter-spacing:0.02em;
  }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-link">← Retour</a>
  <div class="seal"><img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie"></div>
  <h1>Église de Dieu de la Prophétie</h1>
  <p>Waney 93</p>
</div>

<p class="section-title">Membres</p>
<p class="section-sub">Choisissez une action</p>

<nav class="action-grid">
  <button class="action-btn c-add" data-target="membres-ajouter.html">
    <span class="action-icon">➕</span>
    <span class="action-label">Enregistrer un nouveau membre</span>
    <span class="action-sub">Ajouter</span>
  </button>

  <button class="action-btn c-delete" data-target="membres-supprimer.html">
    <span class="action-icon">🗑️</span>
    <span class="action-label">Supprimer un membre</span>
    <span class="action-sub">Retirer</span>
  </button>

  <button class="action-btn c-search" data-target="membres-rechercher.html">
    <span class="action-icon">🔍</span>
    <span class="action-label">Rechercher</span>
    <span class="action-sub">Trouver un membre</span>
  </button>

  <button class="action-btn c-list" data-target="membres-liste.html">
    <span class="action-icon">📋</span>
    <span class="action-label">Afficher liste des membres</span>
    <span class="action-sub">Vue d'ensemble</span>
  </button>
</nav>

<p class="page-footer">Connecté en tant qu'administrateur / trésorier</p>

<script>
  // Sécurité : on vérifie que l'utilisateur est bien connecté
  if (sessionStorage.getItem('trezoLoggedIn') !== 'true') {
    window.location.href = 'index.html';
  }

  // Boutons de navigation (ces pages seront créées étape par étape)
  document.querySelectorAll('.action-btn[data-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      window.location.href = btn.dataset.target;
    });
  });
</script>

</body>
</html>
