<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fiche membre — Église de Dieu de la Prophétie de Waney 93</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A1F44">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  .fiche-wrap{
    width:100%;
    max-width:480px;
    padding:24px 24px 32px;
    margin: 0 auto;
    box-sizing: border-box;
  }

  .fiche-card{
    background:#fff;
    border-radius:12px;
    box-shadow:0 10px 30px -16px rgba(10,31,68,0.25), 0 0 0 1px rgba(0,0,0,0.03);
    overflow:hidden;
  }

  .fiche-photo-band{
    background:linear-gradient(155deg, #0A1F44 0%, #1E3A8A 100%);
    padding:28px 20px 22px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* MODIFIKASYON FOTO POU L PARÈT PI LAJ */
  .fiche-photo{
    width:140px;
    height:140px;
    border-radius:50%;
    border:4px solid #C9543A;
    background:#F2F0E8;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-bottom:14px;
    box-shadow:0 6px 16px -4px rgba(0,0,0,0.3);
  }

  .fiche-photo img{width:100%;height:100%;object-fit:cover;}
  .fiche-photo span{font-size:60px;color:#B8AE94;}

  .fiche-name{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:22.5px;
    color:#fff;
    text-align:center;
    margin-bottom:6px;
  }

  .fiche-fonction-badge{
    display:inline-block;
    font-size:13px;
    font-weight:600;
    color:#0A1F44;
    background:#E2E8F0;
    border-radius:14px;
    padding:4px 14px;
    letter-spacing:0.02em;
    margin-top: 4px;
  }

  .fiche-detail-list{
    padding:8px 22px 22px;
  }

  .fiche-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:13px 0;
    border-bottom:1px solid #EFEAE0;
    gap:14px;
  }

  .fiche-row:last-child{border-bottom:none;}

  .fiche-label{
    font-size:14px;
    font-weight:600;
    color:#9A9182;
    letter-spacing:0.02em;
    flex-shrink:0;
  }

  .fiche-value{
    font-size:15.5px;
    font-weight:600;
    color:#0A1F44;
    text-align:right;
  }

  .fiche-actions{
    display:flex;
    gap:12px;
    padding:0 22px 24px;
  }

  .btn-fiche{
    flex:1;
    padding:13px;
    border:none;
    border-radius:6px;
    font-size:14.5px;
    font-weight:700;
    letter-spacing:0.02em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 4px 12px -5px rgba(0,0,0,0.2);
  }

  .btn-fiche.edit{
    background:linear-gradient(135deg, #0A1F44 0%, #1E3A8A 100%);
    color:white;
  }

  .btn-fiche.search{
    background:#fff;
    border:1.5px solid #D8D2C2;
    color:#0A1F44;
  }

  .empty-state{
    text-align:center;
    padding:40px 16px;
    color:#9A9182;
    font-size:15.5px;
  }

  .btn-fiche{
    border-bottom: 4px solid rgba(0,0,0,0.28) !important;
    transition: transform .1s ease, box-shadow .1s ease, filter .1s ease !important;
  }
  .btn-fiche:active{
    transform: translateY(3px) !important;
    border-bottom-width: 2px !important;
    filter: brightness(0.97);
  }
</style>
</head>
<body>

<div class="page-header">
  <a href="membres-rechercher.html" class="back-link">← Retour</a>
  <div class="seal"><img src="images.jpeg" alt="Logo Église de Dieu de la Prophétie"></div>
  <h1>Église de Dieu de la Prophétie</h1>
  <p>Waney 93</p>
</div>

<p class="section-title">Fiche du membre</p>

<div class="fiche-wrap" id="ficheWrap">
  <p class="empty-state">Chargement...</p>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaNOl7j9xReumR69PIiyTPrwncJ7-ysG8",
    authDomain: "tresor-de-l-eglise.firebaseapp.com",
    projectId: "tresor-de-l-eglise",
    storageBucket: "tresor-de-l-eglise.firebasestorage.app",
    messagingSenderId: "702537717579",
    appId: "1:702537717579:web:e1e8726ab66a89b355face"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  if (sessionStorage.getItem('trezoLoggedIn') !== 'true') {
    window.location.href = 'index.html';
  }

  const ficheWrap = document.getElementById('ficheWrap');

  function formatDate(dateStr){
    if (!dateStr) return null;
    const [year, month, day] = dateStr.split('-');
    if (!year || !month || !day) return dateStr;
    return `${day}/${month}/${year}`;
  }

  function renderFiche(id, data){
    const photoContent = data.photo
      ? `<img src="${data.photo}" alt="Photo de ${data.nom || ''}">`
      : `<span>👤</span>`;

    // Afiche fonksyon / gwoup manm lan si l genyen
    const fonctionBadge = data.fonctions
      ? `<span class="fiche-fonction-badge">${data.fonctions}</span>`
      : '';

    // KOUNYEYA TOUT INFO YO KOWÒDONE AK FÒMILÈ MEMBRES-AJOUTER A EKZAKTEMAN
    const rows = [
      { label: 'Date de naissance', value: formatDate(data.dateNaissance) },
      { label: 'Sexe', value: data.sexe },
      { label: 'Condition matrimoniale', value: data.conditionMatrimoniale },
      { label: 'Téléphone 1', value: data.telephone1 },
      { label: 'Téléphone 2', value: data.telephone2 },
      { label: 'Adresse Résidentielle', value: data.adresse },
      { label: 'Date du baptême', value: formatDate(data.dateBapteme) },
      { label: 'Statut Actuel', value: data.statut },
      { label: 'Numéro NIF / CIN', value: data.carte },
      { label: 'Cotisation Mensuelle (HTG)', value: data.cotisation ? data.cotisation + ' HTG' : null }
    ].filter(row => row.value);

    const rowsHtml = rows.map(row => `
      <div class="fiche-row">
        <span class="fiche-label">${row.label}</span>
        <span class="fiche-value">${row.value}</span>
      </div>
    `).join('');

    ficheWrap.innerHTML = `
      <div class="fiche-card">
        <div class="fiche-photo-band">
          <div class="fiche-photo">${photoContent}</div>
          <div class="fiche-name">${data.nom || ''} ${data.prenom || ''}</div>
          ${fonctionBadge}
        </div>
        <div class="fiche-detail-list">
          ${rowsHtml || '<p style="text-align:center;color:#9A9182;font-size:14.5px;padding:8px 0;">Aucune information supplémentaire.</p>'}
        </div>
        <div class="fiche-actions">
          <button class="btn-fiche edit" id="btnEditMember">Modifier</button>
          <button class="btn-fiche search" id="btnBackSearch">Rechercher</button>
        </div>
      </div>
    `;

    // Redireksyon an ranje pou l mache byen ak paramet fòmilè a espere (?id=...)
    document.getElementById('btnEditMember').addEventListener('click', () => {
      window.location.href = `membres-ajouter.html?id=${encodeURIComponent(id)}`;
    });

    document.getElementById('btnBackSearch').addEventListener('click', () => {
      window.location.href = 'membres-rechercher.html';
    });
  }

  async function loadMember(){
    const params = new URLSearchParams(window.location.search);
    const membreId = params.get('membreId');

    if (!membreId) {
      ficheWrap.innerHTML = '<p class="empty-state">Aucun membre spécifié.</p>';
      return;
    }

    try {
      const snap = await getDoc(doc(db, 'membres', membreId));
      if (!snap.exists()) {
        ficheWrap.innerHTML = '<p class="empty-state">Membre introuvable.</p>';
        return;
      }
      renderFiche(membreId, snap.data());
    } catch (err) {
      console.error(err);
      ficheWrap.innerHTML = '<p class="empty-state">Erreur lors du chargement : ' + err.message + '</p>';
    }
  }

  loadMember();
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
